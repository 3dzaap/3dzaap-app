<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<title>3DZAAP — Diagnóstico</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: monospace; background: #0d1117; color: #e6edf3; padding: 24px; margin: 0; }
  h1 { color: #58a6ff; font-size: 1.1rem; margin-bottom: 20px; }
  .section { margin: 16px 0; }
  .label { color: #8b949e; font-size: .8rem; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
  .result { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; font-size: .82rem; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
  .ok   { border-color: #238636; color: #3fb950; }
  .err  { border-color: #da3633; color: #f85149; }
  .warn { border-color: #9e6a03; color: #d29922; }
  .info { border-color: #1f6feb; color: #58a6ff; }
  button { background: #238636; color: #fff; border: none; padding: 10px 22px; border-radius: 6px; cursor: pointer; font-size: .9rem; font-family: monospace; margin-bottom: 20px; }
  button:hover { background: #2ea043; }
  .copy-btn { background: #1f6feb; padding: 6px 14px; font-size: .78rem; margin: 8px 0 0; display: inline-block; }
  #output { max-width: 800px; }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<h1>🔍 3DZAAP — Diagnóstico Supabase</h1>
<p style="color:#8b949e;font-size:.85rem;margin-bottom:20px;">
  Este ficheiro deve ser aberto <strong style="color:#e6edf3">no mesmo servidor</strong> que o 3DZAAP,
  com o utilizador já autenticado (sessão activa).
</p>
<button onclick="runDiag()">▶ Correr Diagnóstico</button>
<div id="output"></div>

<script>
const SUPABASE_URL  = 'https://yjggsndxatezgqljlhxb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqZ2dzbmR4YXRlemdxbGpsaHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjE0MTgsImV4cCI6MjA4OTA5NzQxOH0.zVzA2siKsix8tOK44H5U-cZK1Wdd_4u_sY1g2JgGYUA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const out = document.getElementById('output');
const results = [];

function add(label, cls, content) {
  const html = `<div class="section"><div class="label">${label}</div><div class="result ${cls}">${content}</div></div>`;
  out.innerHTML += html;
  results.push({ label, cls, content });
}

function j(obj) { return JSON.stringify(obj, null, 2); }

async function runDiag() {
  out.innerHTML = '<div style="color:#58a6ff;margin-bottom:12px"><span class="spinner">⟳</span> A correr diagnóstico...</div>';
  results.length = 0;

  // ── 1. Sessão ────────────────────────────────────────────
  const { data: { session }, error: sessErr } = await sb.auth.getSession();
  if (sessErr || !session) {
    add('1. Sessão', 'err', '❌ SEM SESSÃO — Faz login primeiro em dashboard.html ou auth-onboarding.html');
    addCopyBtn();
    return;
  }
  const uid = session.user.id;
  add('1. Sessão', 'ok', `✅ Autenticado\nUID: ${uid}\nEmail: ${session.user.email}`);

  // ── 2. companies (sem filtro) ────────────────────────────
  const r2 = await sb.from('companies').select('id, name, owner_id, plan, config').limit(5);
  if (r2.error) {
    add('2. companies (sem filtro)', 'err', `❌ ${r2.error.code} — ${r2.error.message}\n\nEsto significa que a RLS policy em companies está a bloquear mesmo sem filtro.\nSolução: a policy deve ter USING (owner_id = auth.uid())`);
  } else {
    add('2. companies (sem filtro)', r2.data?.length ? 'ok' : 'warn',
      r2.data?.length
        ? `✅ ${r2.data.length} empresa(s) encontrada(s)\n${j(r2.data)}`
        : `⚠️ 0 resultados — Utilizador autenticado mas sem empresa associada.\nO registo pode ter falhado a criar a company.`
    );
  }

  // ── 3. companies (owner_id) ──────────────────────────────
  const r3 = await sb.from('companies').select('id, name, owner_id, plan').eq('owner_id', uid).limit(1).single();
  if (r3.error && r3.error.code !== 'PGRST116') {
    add('3. companies (owner_id filter)', 'err', `❌ ${r3.error.code} — ${r3.error.message}`);
  } else if (r3.data) {
    add('3. companies (owner_id filter)', 'ok', `✅ Empresa encontrada via owner_id\n${j(r3.data)}`);
  } else {
    add('3. companies (owner_id filter)', 'warn', '⚠️ Nenhuma empresa com este owner_id');
  }

  const companyId = r3.data?.id || r2.data?.[0]?.id || null;
  add('→ company_id resolvido', companyId ? 'ok' : 'err',
    companyId ? `✅ _companyId = ${companyId}` : '❌ FALHOU — todos os DB.* vão falhar com uuid: null'
  );

  if (!companyId) { addCopyBtn(); return; }

  // ── 4. filaments ─────────────────────────────────────────
  const r4 = await sb.from('filaments').select('id, type, color_name').eq('company_id', companyId).limit(3);
  if (r4.error) {
    add('4. filaments', 'err', `❌ ${r4.error.code} — ${r4.error.message}\n\nRLS em filaments pode estar a usar get_user_company_id() que depende de memberships.`);
  } else {
    add('4. filaments', 'ok', `✅ ${r4.data.length} filamento(s)\n${j(r4.data.slice(0,2))}`);
  }

  // ── 5. orders ────────────────────────────────────────────
  const r5 = await sb.from('orders').select('id, order_number, status').eq('company_id', companyId).limit(3);
  if (r5.error) {
    add('5. orders', 'err', `❌ ${r5.error.code} — ${r5.error.message}`);
  } else {
    add('5. orders', 'ok', `✅ ${r5.data.length} pedido(s)\n${j(r5.data.slice(0,2))}`);
  }

  // ── 6. expenses ──────────────────────────────────────────
  const r6 = await sb.from('expenses').select('id, description, value').eq('company_id', companyId).limit(3);
  if (r6.error) {
    add('6. expenses', 'err', `❌ ${r6.error.code} — ${r6.error.message}`);
  } else {
    add('6. expenses', 'ok', `✅ ${r6.data.length} despesa(s)`);
  }

  // ── 7. activity_log ──────────────────────────────────────
  const r7 = await sb.from('activity_log').select('id').eq('company_id', companyId).limit(1);
  if (r7.error) {
    add('7. activity_log', r7.error.code === '42P01' ? 'warn' : 'err',
      r7.error.code === '42P01'
        ? `⚠️ Tabela activity_log não existe — criar com o script SQL`
        : `❌ ${r7.error.code} — ${r7.error.message}`
    );
  } else {
    add('7. activity_log', 'ok', `✅ Tabela existe`);
  }

  // ── 8. memberships ───────────────────────────────────────
  const r8 = await sb.from('memberships').select('*').eq('user_id', uid).limit(1);
  if (r8.error) {
    add('8. memberships', r8.error.code === '42P01' ? 'warn' : 'err',
      r8.error.code === '42P01'
        ? `⚠️ Tabela memberships não existe — NORMAL se usas owner_id directo`
        : `❌ ${r8.error.code} — ${r8.error.message}`
    );
  } else {
    add('8. memberships', r8.data?.length ? 'ok' : 'warn',
      r8.data?.length ? `✅ ${r8.data.length} membership(s)` : '⚠️ 0 memberships (OK se RLS usa owner_id)'
    );
  }

  // ── 9. Test INSERT filament ───────────────────────────────
  const testRow = { company_id: companyId, type:'TEST_DIAG', variation:'Basic', color_name:'Diagnóstico', color_hex:'#FF0000', brand:'Test', roll_size:'1kg', total:0, in_use:0 };
  const r9i = await sb.from('filaments').insert(testRow).select('id').single();
  if (r9i.error) {
    add('9. INSERT filament (teste)', 'err', `❌ ${r9i.error.code} — ${r9i.error.message}\n\nEste é o erro que causa "Erro ao guardar" ao adicionar filamentos.`);
  } else {
    add('9. INSERT filament (teste)', 'ok', `✅ INSERT funcionou — id: ${r9i.data.id}`);
    // Cleanup
    await sb.from('filaments').delete().eq('id', r9i.data.id);
    add('9. DELETE cleanup', 'ok', '✅ Linha de teste eliminada');
  }

  // ── 10. Test INSERT order ────────────────────────────────
  const testOrder = { company_id: companyId, order_number:'TEST-DIAG', order_numeric:99999, client_name:'Diagnóstico', items:[], total:0, status:'orcamento', payment_status:'pendente' };
  const r10i = await sb.from('orders').insert(testOrder).select('id').single();
  if (r10i.error) {
    add('10. INSERT order (teste)', 'err', `❌ ${r10i.error.code} — ${r10i.error.message}\n\nEste é o erro "row violates row-level security policy for table orders".`);
  } else {
    add('10. INSERT order (teste)', 'ok', `✅ INSERT ordem funcionou — id: ${r10i.data.id}`);
    await sb.from('orders').delete().eq('id', r10i.data.id);
    add('10. DELETE cleanup', 'ok', '✅ Linha de teste eliminada');
  }

  // ── RESUMO ───────────────────────────────────────────────
  const errors = results.filter(r => r.cls === 'err');
  const warns  = results.filter(r => r.cls === 'warn');

  if (errors.length === 0) {
    add('✅ RESUMO', 'ok', `Tudo funcional! ${warns.length} aviso(s) menores.\nPodes fechar este ficheiro.`);
  } else {
    const fixes = [];
    if (errors.some(e => e.label.includes('companies') && e.content.includes('406')))
      fixes.push('• Correr o script 3dzaap_migration.sql no Supabase SQL Editor');
    if (errors.some(e => e.content.includes('get_user_company_id')))
      fixes.push('• A função get_user_company_id() usa memberships — substituir pela nova get_my_company_id()');
    if (errors.some(e => e.label.includes('INSERT')))
      fixes.push('• Policies de INSERT em falta — correr migration SQL');
    if (!companyId)
      fixes.push('• Nenhuma empresa encontrada — registar novamente ou criar company manualmente no Supabase Table Editor');

    add(`❌ RESUMO — ${errors.length} erro(s)`, 'err',
      `Acções necessárias:\n${fixes.length ? fixes.join('\n') : '• Ver erros acima e correr migration SQL'}`
    );
  }

  addCopyBtn();
}

function addCopyBtn() {
  const text = results.map(r => `[${r.label}]\n${r.content}`).join('\n\n---\n\n');
  out.innerHTML += `
    <div class="section">
      <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('diagtext').value).then(()=>this.textContent='✅ Copiado!')">
        📋 Copiar resultado completo
      </button>
      <textarea id="diagtext" style="position:absolute;opacity:0;pointer-events:none">${text}</textarea>
    </div>`;
}
</script>
</body>
</html>
