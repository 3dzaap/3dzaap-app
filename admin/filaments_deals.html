<!DOCTYPE html>
<html lang="pt-PT">
<head>
<link rel="icon" type="image/jpeg" href="../logo.jpg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin 3DZAAP — Filamentos Hot Deals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<script>
(function(){
  var t = localStorage.getItem('3dzaap_theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="admin.css">
<style>
  .deal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }
  .deal-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .deal-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
  }
  .deal-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    background: #ff4757;
    color: white;
    font-weight: 800;
    font-size: 0.75rem;
    padding: 4px 8px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
    box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
  }
  .deal-title {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 4px;
    padding-right: 70px; /* space for badge */
  }
  .deal-meta {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .deal-price-box {
    background: var(--bg-body);
    padding: 12px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex: 1;
  }
  .price-now {
    font-size: 1.4rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    color: var(--admin-blue);
  }
  .price-old {
    font-size: 0.85rem;
    color: var(--muted);
    text-decoration: line-through;
  }
  .store-info {
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
</style>
</head>
<body>

<div class="adm-layout">
  
  <div class="adm-main">
    <div class="adm-topbar">
      <button class="adm-mob-toggle" onclick="toggleAdminSidebar()"><i class="ph-bold ph-list"></i></button>
      <div class="adm-topbar-title">Motor Inteligente</div>
      <div class="adm-topbar-right">
        <button class="btn-action" onclick="toggleTheme()" id="topbarThemeToggle" title="Alternar Tema">
          <i class="ph-bold ph-moon"></i>
        </button>
      </div>
    </div>

    <div class="adm-page" id="adminContent" style="display:none">
      <div class="adm-page-header">
        <div>
          <h1><i class="ph-bold ph-fire" style="color: #ff4757"></i> Hot Deals: Filamentos</h1>
          <div class="adm-page-sub">Oportunidades de preço detetadas automaticamente nas últimas 24 horas</div>
        </div>
        <button class="btn btn-primary" onclick="loadDeals()"><i class="ph-bold ph-arrows-clockwise"></i> Atualizar</button>
      </div>

      <div class="admin-toolbar" style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <div class="admin-search-wrap" style="flex:1; min-width:200px">
          <span class="admin-search-icon"><i class="ph-bold ph-magnifying-glass"></i></span>
          <input class="admin-search form-input" id="searchDeals" placeholder="Pesquisar material, marca ou cor…" oninput="filterDeals()">
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap">
          <select class="form-select" id="filterMaterial" onchange="filterDeals()" style="width:auto">
            <option value="">Todos os materiais</option>
            <option value="PLA">PLA</option>
            <option value="PETG">PETG</option>
            <option value="ABS">ABS</option>
            <option value="TPU">TPU</option>
          </select>
        </div>
      </div>

      <div id="loadingDeals" style="text-align: center; padding: 40px; color: var(--muted); font-weight: 500;">
        A procurar oportunidades no mercado...
      </div>

      <div class="deal-grid" id="dealsGrid">
        <!-- Renderizado via JS -->
      </div>
      
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="admin-core.js"></script>
<script src="admin-sidebar.js"></script>
<script>
let _deals = [];

async function initPage() {
  initThemeToggle();
  AdminSidebar.init();
  checkAdminAccess(async () => {
    document.getElementById('adminContent').style.display = 'block';
    await loadDeals();
  });
}

async function loadDeals() {
  const grid = document.getElementById('dealsGrid');
  const loader = document.getElementById('loadingDeals');
  
  grid.innerHTML = '';
  loader.style.display = 'block';

  try {
    const { data, error } = await _adminSb()
      .from('filaments_deals')
      .select('*')
      .eq('is_hot_deal', true)
      .order('discount_percentage', { ascending: false });

    if (error) throw error;
    _deals = data || [];
    renderDeals(_deals);
    loader.style.display = 'none';

  } catch(e) {
    console.error('loadDeals err:', e);
    showToast('Erro ao carregar ofertas: ' + e.message, 'err');
    loader.innerHTML = 'Erro ao carregar os dados. Verifique a consola.';
  }
}

function renderDeals(data) {
  const grid = document.getElementById('dealsGrid');
  
  if (!data.length) {
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:48px; color:var(--muted); background:var(--bg-card); border-radius:12px">Nenhuma oferta identificada de momento. Os preços estão acima da média.</div>';
    return;
  }

  grid.innerHTML = data.map(deal => {
    const currencySym = deal.currency === 'EUR' ? '€' : (deal.currency === 'BRL' ? 'R$' : deal.currency);
    const weightKg = deal.weight_g / 1000;
    
    return `
      <div class="deal-card">
        <div class="deal-badge"><i class="ph-bold ph-trend-down"></i> ${deal.discount_percentage}% OFF</div>
        <div class="deal-title">${deal.name}</div>
        <div class="deal-meta">
          <span style="color:var(--admin-blue); font-weight:700">${deal.material}</span> • 
          ${deal.color ? deal.color + ' • ' : ''} 
          ${deal.brand || 'Sem Marca'} • ${weightKg}kg
        </div>
        
        <div class="deal-price-box">
          <div>
            <div style="font-size: 0.7rem; color: var(--muted); font-weight: 700; text-transform: uppercase;">Preço Atual</div>
            <div class="price-now">${currencySym} ${deal.current_price.toFixed(2)}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size: 0.7rem; color: var(--muted); font-weight: 700; text-transform: uppercase;">Média 30 Dias</div>
            <div class="price-old">${currencySym} ${deal.avg_price_30d.toFixed(2)} / kg</div>
          </div>
        </div>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top: auto">
          <div class="store-info">
            <i class="ph-bold ph-storefront"></i> ${deal.store_name}
          </div>
          <a href="${deal.product_url}" target="_blank" class="btn btn-primary btn-sm" style="text-decoration:none">
            Ver Oferta <i class="ph-bold ph-arrow-square-out"></i>
          </a>
        </div>
      </div>
    `;
  }).join('');
}

function filterDeals() {
  const q = document.getElementById('searchDeals').value.toLowerCase();
  const material = document.getElementById('filterMaterial').value;
  
  const filtered = _deals.filter(d => {
    const matchQ = !q || (d.name && d.name.toLowerCase().includes(q)) || 
                   (d.brand && d.brand.toLowerCase().includes(q)) || 
                   (d.color && d.color.toLowerCase().includes(q));
    const matchMat = !material || d.material === material;
    return matchQ && matchMat;
  });
  
  renderDeals(filtered);
}

window.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
