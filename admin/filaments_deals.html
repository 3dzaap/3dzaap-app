<!DOCTYPE html>
<html lang="pt-PT">
<head>
<link rel="icon" type="image/jpeg" href="../logo.jpg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin 3DZAAP — Motor Live de Filamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<script>
(function(){
  var t = localStorage.getItem('3dzaap_theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="admin.css">
<style>
  .deal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }
  .deal-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .deal-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
  }
  .deal-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--admin-blue);
    color: white;
    font-weight: 800;
    font-size: 0.75rem;
    padding: 4px 8px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
    box-shadow: 0 4px 10px rgba(0, 114, 255, 0.3);
  }
  .deal-badge.cache {
    background: var(--admin-success);
    box-shadow: 0 4px 10px rgba(0, 200, 117, 0.3);
  }
  .deal-title {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 4px;
    padding-right: 70px;
  }
  .deal-meta {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .deal-price-box {
    background: var(--bg-body);
    padding: 12px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex: 1;
  }
  .price-now {
    font-size: 1.6rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    color: var(--admin-blue);
  }
  .store-info {
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="adm-layout">
  
  <div class="adm-main">
    <div class="adm-topbar">
      <button class="adm-mob-toggle" onclick="toggleAdminSidebar()"><i class="ph-bold ph-list"></i></button>
      <div class="adm-topbar-title">Motor Inteligente</div>
      <div class="adm-topbar-right">
        <button class="btn-action" onclick="toggleTheme()" id="topbarThemeToggle" title="Alternar Tema">
          <i class="ph-bold ph-moon"></i>
        </button>
      </div>
    </div>

    <div class="adm-page" id="adminContent" style="display:none">
      <div class="adm-page-header">
        <div>
          <h1><i class="ph-bold ph-magnifying-glass" style="color: var(--admin-blue)"></i> Pesquisa Live: Filamentos</h1>
          <div class="adm-page-sub">Consulta em tempo real aos melhores preços agregados (Zoom/Buscapé)</div>
        </div>
      </div>

      <div class="ad-card" style="margin-bottom: 24px; padding: 20px;">
        <form id="liveSearchForm" style="display:flex; gap:16px; align-items:flex-end; flex-wrap:wrap" onsubmit="event.preventDefault(); doLiveSearch();">
          <div style="flex: 1; min-width: 150px">
            <label class="form-label">Material</label>
            <select class="form-select" id="searchMat" required>
              <option value="PLA">PLA</option>
              <option value="PETG">PETG</option>
              <option value="ABS">ABS</option>
              <option value="TPU">TPU</option>
            </select>
          </div>
          <div style="flex: 2; min-width: 200px">
            <label class="form-label">Cor Desejada</label>
            <input type="text" class="form-input" id="searchColor" placeholder="Ex: Preto, Branco, Silk Ouro..." required>
          </div>
          <div>
            <button type="submit" class="btn btn-primary" id="btnSearch">
              <i class="ph-bold ph-magnifying-glass"></i> Procurar Melhores Preços
            </button>
          </div>
        </form>
      </div>

      <div id="loadingDeals" style="text-align: center; padding: 40px; color: var(--muted); font-weight: 500; display:none">
        <i class="ph-bold ph-spinner ph-spin" style="font-size: 2rem; color: var(--admin-blue); margin-bottom: 12px; display:inline-block"></i>
        <br>
        A rastrear o mercado em tempo real...
      </div>

      <div class="deal-grid" id="dealsGrid">
        <!-- Renderizado via JS -->
        <div style="grid-column: 1/-1; text-align:center; padding:48px; color:var(--muted); background:var(--bg-card); border-radius:12px; border: 1px dashed var(--border)">
          Utilize o formulário acima para pesquisar os melhores preços no mercado.
        </div>
      </div>
      
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="admin-core.js"></script>
<script src="admin-sidebar.js"></script>
<script>
async function initPage() {
  initThemeToggle();
  AdminSidebar.init();
  checkAdminAccess(async () => {
    document.getElementById('adminContent').style.display = 'block';
  });
}

async function doLiveSearch() {
  const mat = document.getElementById('searchMat').value;
  const col = document.getElementById('searchColor').value.trim();
  const btn = document.getElementById('btnSearch');
  const loader = document.getElementById('loadingDeals');
  const grid = document.getElementById('dealsGrid');

  if (!mat || !col) return;

  btn.disabled = true;
  grid.innerHTML = '';
  loader.style.display = 'block';

  try {
    const { data, error } = await _adminSb().functions.invoke('search-filament-live', {
      body: { material: mat, color: col }
    });

    if (error) throw error;
    
    loader.style.display = 'none';
    renderDeals(data);

  } catch(e) {
    console.error('search err:', e);
    showToast('Erro ao procurar ofertas: ' + (e.message || "Erro de rede"), 'err');
    loader.style.display = 'none';
    grid.innerHTML = '<div style="color:var(--danger)">Erro na pesquisa. Tente novamente.</div>';
  } finally {
    btn.disabled = false;
  }
}

function renderDeals(data) {
  const grid = document.getElementById('dealsGrid');
  const results = data.results || [];
  
  if (!results.length) {
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:48px; color:var(--muted); background:var(--bg-card); border-radius:12px">Nenhuma oferta encontrada para esta pesquisa.</div>';
    return;
  }

  const isCache = data.source === 'cache';
  const badgeClass = isCache ? 'deal-badge cache' : 'deal-badge';
  const badgeText = isCache ? '<i class="ph-bold ph-lightning"></i> Da Cache' : '<i class="ph-bold ph-globe"></i> Pesquisa Live';

  grid.innerHTML = results.map((deal, idx) => {
    return `
      <div class="deal-card">
        <div class="${badgeClass}">${idx === 0 ? '🏆 Melhor Preço' : `#${idx+1} Opção`}</div>
        <div class="deal-title" style="margin-top: 10px">${deal.title}</div>
        
        <div class="deal-price-box" style="margin-top: 16px">
          <div>
            <div style="font-size: 0.7rem; color: var(--muted); font-weight: 700; text-transform: uppercase;">Preço Encontrado</div>
            <div class="price-now">R$ ${deal.price.toFixed(2)}</div>
          </div>
        </div>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top: auto">
          <div class="store-info">
            <i class="ph-bold ph-storefront"></i> ${deal.store}
          </div>
          <a href="${deal.link}" target="_blank" class="btn btn-primary btn-sm" style="text-decoration:none">
            Comprar <i class="ph-bold ph-arrow-square-out"></i>
          </a>
        </div>
      </div>
    `;
  }).join('');
}

window.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
