<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DZAAP — Calculadora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script src="js/core/calculator.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* MANTENDO TODO O SEU DESIGN SYSTEM ORIGINAL 
   (Liquid Glass, Variáveis, Sidebar, etc)
*/
:root{
  --blue:#3B8FD4;--blue-d:#2a6fb0;--blue-dd:#1a4f80;--blue-lt:#72B8F0;--blue-g:rgba(59,143,212,0.10);
  --orange:#F5943A;--orange-d:#d4762a;--orange-lt:#FFB870;--orange-g:rgba(245,148,58,0.12);
  --black:#0D1117;--dark:#1a2332;--muted:#4A5568;--subtle:#94A3B8;
  --border:rgba(255,255,255,0.08);--glass:rgba(255,255,255,0.03);
}
*{margin:0;padding:0;box-sizing:border-box;outline:none;}
body{background:var(--black);color:var(--white);font-family:'Outfit',sans-serif;overflow-x:hidden;}

/* Preservando seu layout de grids e inputs */
.calc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:30px;}
.input-group{background:var(--glass);border:1px solid var(--border);padding:15px;border-radius:12px;}
label{display:block;color:var(--subtle);font-size:0.8rem;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
input{width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--border);color:white;padding:10px;border-radius:8px;font-family:'JetBrains Mono';}
input:focus{border-color:var(--blue);background:rgba(59,143,212,0.05);}

.res-card{background:linear-gradient(135deg, var(--blue-g), transparent);border:1px solid var(--blue);padding:20px;border-radius:12px;text-align:center;}
.res-val{font-size:2rem;font-weight:800;color:var(--orange);margin:10px 0;}
</style>
</head>
<body>

<div id="sideOverlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
    </aside>

<main style="padding: 40px;">
    <h1 style="margin-bottom:30px;">Calculadora de Impressão</h1>

    <div class="calc-grid">
        <div class="input-group">
            <label>Peso da Peça (g)</label>
            <input type="number" id="pieceWeight" value="100" oninput="updateUI()">
        </div>
        <div class="input-group">
            <label>Tempo de Impressão (min)</label>
            <input type="number" id="printTime" value="120" oninput="updateUI()">
        </div>
        <div class="input-group">
            <label>Preço do Filamento (€/kg)</label>
            <input type="number" id="filPrice" value="25" oninput="updateUI()">
        </div>
        <div class="input-group">
            <label>Consumo Máquina (W)</label>
            <input type="number" id="powerCons" value="150" oninput="updateUI()">
        </div>
        </div>

    <div class="calc-grid" style="grid-template-columns: 1fr 1fr 1fr 1fr;">
        <div class="res-card">
            <label>Material</label>
            <div id="resMaterial" class="res-val">€ 0.00</div>
        </div>
        <div class="res-card">
            <label>Energia</label>
            <div id="resEnergy" class="res-val">€ 0.00</div>
        </div>
        <div class="res-card" style="grid-column: span 2; background: var(--orange-g);">
            <label>Preço Total Sugerido</label>
            <div id="resTotal" class="res-val" style="font-size: 3rem;">€ 0.00</div>
        </div>
    </div>
</main>

<script>
/**
 * MANTENDO SUAS FUNÇÕES AUXILIARES ORIGINAIS
 */
function pf(id){return parseFloat((document.getElementById(id)||{}).value)||0;}
function setT(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function fmtEur(v){return '€\u00A0'+parseFloat(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});}

/**
 * NOVA LÓGICA DE ATUALIZAÇÃO (Usando o Motor Centralizado)
 */
function updateUI() {
    // 1. Coleta os dados usando seus IDs originais
    const inputs = {
        weightGrams: pf('pieceWeight'),
        printTimeMinutes: pf('printTime'),
        filamentPrice: pf('filPrice'),
        filamentWeight: pf('filWeight') || 1000,
        powerConsumption: pf('powerCons') || 150,
        kwhPrice: pf('kwhPrice') || 0.22,
        machinePrice: pf('machPrice') || 300,
        machineLifeMonths: pf('machLife') || 24,
        machineHoursPerDay: pf('machHours') || 12,
        failureRate: pf('failRate') || 5,
        profitMargin: pf('profitMargin') || 50,
        laborFee: pf('laborFee') || 0
    };

    // 2. Chama o motor PrintCalculator que vem do calculator.js
    if (typeof PrintCalculator !== 'undefined') {
        const res = PrintCalculator.calculate(inputs);

        // 3. Atualiza os campos de texto na sua interface original
        setT('resMaterial', fmtEur(res.materialCost));
        setT('resEnergy',   fmtEur(res.energyCost));
        setT('resTotal',    fmtEur(res.finalPrice));
    } else {
        console.error("Motor de cálculo centralizado não carregado.");
    }
}

// Inicializa o cálculo ao abrir a página
window.onload = updateUI;
</script>

</body>
</html>
