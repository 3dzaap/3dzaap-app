<style>
:root{
  --blue:#3B8FD4;--blue-d:#2a6fb0;--blue-dd:#1a4f80;--blue-lt:#72B8F0;--blue-g:rgba(59,143,212,0.10);
  --orange:#F5943A;--orange-d:#d4762a;--orange-lt:#FFB870;--orange-g:rgba(245,148,58,0.12);
  --black:#0D1117;--dark:#1a2332;--muted:#4A5568;--subtle:#94A3B8;
  --border:rgba(255,255,255,0.08);--glass:rgba(255,255,255,0.03);

</style>
</head>
<body>

<script>
// --- FUNÇÕES AUXILIARES ORIGINAIS ---
function pf(id){return parseFloat((document.getElementById(id)||{}).value)||0;}
function setV(id,v){const el=document.getElementById(id);if(el)el.value=v;}
function setT(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function fmtEur(v){return '€\u00A0'+parseFloat(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});}

/**
 * ALTERAÇÃO: updateUI atualizada para usar o calculator.js
 * Não altera o layout, apenas a origem dos cálculos.
 */
function updateUI() {
  if (typeof PrintCalculator === 'undefined') return;

  // 1. Coleta dados dos seus inputs originais
  const inputs = {
    weightGrams:        pf('pieceWeight'),
    printTimeMinutes:   pf('printTime'),
    filamentPrice:      pf('filPrice'),
    filamentWeight:     pf('filWeight'),
    powerConsumption:   pf('powerCons'),
    kwhPrice:           pf('kwhPrice'),
    machinePrice:       pf('machPrice'),
    machineLifeMonths:  pf('machLife'),
    machineHoursPerDay: pf('machHours'),
    failureRate:        pf('failRate'),
    profitMargin:       pf('profitMargin'),
    laborFee:           pf('laborFee')
  };

  // 2. Calcula usando o motor externo
  const res = PrintCalculator.calculate(inputs);

  // 3. Exibe nos seus campos de resultado originais
  setT('resMaterial', fmtEur(res.materialCost));
  setT('resEnergy',   fmtEur(res.energyCost));
  setT('resMachine',  fmtEur(res.machineCost));
  setT('resTotal',    fmtEur(res.finalPrice));
}

// O resto das suas funções (Auth, Sidebar, Toast) permanecem iguais
</script>
</body>
</html>
