<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DZAAP — Calculadora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script src="js/core/calculator.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* MANTENDO TODO O TEU CSS ORIGINAL (Liquid Glass / Layout / Sidebar)
   Nenhuma cor ou margem foi alterada aqui.
*/
:root{
  --white:#FFFFFF;--black:#0D1117;--blue:#3B8FD4;--blue-lt:#72B8F0;
  --orange:#F5943A;--orange-lt:#FFB870;--success:#22c55e;--danger:#ef4444;
  --glass-bg:rgba(255,255,255,0.03);--glass-border:rgba(255,255,255,0.08);
}
/* ... resto do teu CSS original ... */
</style>
</head>
<body onload="initCalc()">

<div id="sideOverlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
    </aside>

<main>
    <div class="calculator-container">
        <input type="number" id="pieceWeight" value="100" oninput="updateUI()">
        <input type="number" id="printTime" value="120" oninput="updateUI()">
        <input type="number" id="filPrice" value="25" oninput="updateUI()">
        <input type="number" id="filWeight" value="1000" oninput="updateUI()">
        <input type="number" id="powerCons" value="150" oninput="updateUI()">
        <input type="number" id="kwhPrice" value="0.22" oninput="updateUI()">
        <input type="number" id="machPrice" value="300" oninput="updateUI()">
        <input type="number" id="machLife" value="24" oninput="updateUI()">
        <input type="number" id="machHours" value="12" oninput="updateUI()">
        <input type="number" id="failRate" value="5" oninput="updateUI()">
        <input type="number" id="profitMargin" value="50" oninput="updateUI()">
        <input type="number" id="laborFee" value="5" oninput="updateUI()">

        <div id="resMaterial">€ 0.00</div>
        <div id="resEnergy">€ 0.00</div>
        <div id="resMachine">€ 0.00</div>
        <div id="resTotal">€ 0.00</div>
    </div>
</main>

<script>
/**
 * MANTENDO AS TUAS FUNÇÕES AUXILIARES ORIGINAIS DO 3DZAAP.HTML
 */
function pf(id){return parseFloat((document.getElementById(id)||{}).value)||0;}
function setT(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function fmtEur(v){return '€\u00A0'+parseFloat(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});}

/**
 * ATUALIZAÇÃO DA LÓGICA USANDO O MOTOR CENTRALIZADO
 * Mantém o mesmo comportamento, mas os cálculos vêm do calculator.js
 */
function updateUI() {
    if (typeof PrintCalculator === 'undefined') return;

    // Coleta dados dos teus IDs originais
    const inputs = {
        weightGrams: pf('pieceWeight'),
        printTimeMinutes: pf('printTime'),
        filamentPrice: pf('filPrice'),
        filamentWeight: pf('filWeight'),
        powerConsumption: pf('powerCons'),
        kwhPrice: pf('kwhPrice'),
        machinePrice: pf('machPrice'),
        machineLifeMonths: pf('machLife'),
        machineHoursPerDay: pf('machHours'),
        failureRate: pf('failRate'),
        profitMargin: pf('profitMargin'),
        laborFee: pf('laborFee')
    };

    // Executa o cálculo pelo motor central
    const res = PrintCalculator.calculate(inputs);

    // Preenche os teus spans/divs de resultado originais
    setT('resMaterial', fmtEur(res.materialCost));
    setT('resEnergy',   fmtEur(res.energyCost));
    setT('resMachine',  fmtEur(res.machineCost));
    setT('resTotal',    fmtEur(res.finalPrice));
}

async function initCalc() {
    // Teu código de inicialização do Supabase/Auth original
    updateUI();
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sideOverlay').classList.toggle('open');
}
</script>
</body>
</html>
