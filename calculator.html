<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DZAAP — Calculadora</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    
    <script src="js/core/calculator.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Mantendo o teu estilo Liquid Glass original */
        body { font-family: 'Outfit', sans-serif; background: #0D1117; color: white; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input { background: rgba(0,0,0,0.3); border: 1px solid #3B8FD4; color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        label { font-size: 0.85rem; color: #94A3B8; display: block; margin-bottom: 5px; }
        .res-destaque { color: #F5943A; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>3DZAAP Calculator</h2>
    <div class="grid">
        <div>
            <label>Peso da Peça (g)</label>
            <input type="number" id="pieceWeight" value="100" oninput="renderCalculation()">
        </div>
        <div>
            <label>Tempo (minutos)</label>
            <input type="number" id="printTime" value="120" oninput="renderCalculation()">
        </div>
        <div>
            <label>Preço Rolo (€)</label>
            <input type="number" id="filPrice" value="25" oninput="renderCalculation()">
        </div>
        <div>
            <label>Peso Rolo (g)</label>
            <input type="number" id="filWeight" value="1000" oninput="renderCalculation()">
        </div>
    </div>

    <div style="margin-top:20px; border-top: 1px solid #333; pt: 15px;">
        <p>Material: <span id="resMaterial">€ 0.00</span></p>
        <p>Energia: <span id="resEnergy">€ 0.00</span></p>
        <p>Preço Final: <span id="resTotal" class="res-destaque">€ 0.00</span></p>
    </div>
</div>

<script>
    /**
     * Esta função substitui a lógica antiga 'pf()' e 'setV()'
     * utilizando agora o objeto global PrintCalculator do ficheiro externo.
     */
    function renderCalculation() {
        if (typeof PrintCalculator === 'undefined') {
            console.warn("Aguardando carregamento do calculator.js...");
            return;
        }

        // 1. Captura os valores da UI
        const inputs = {
            weightGrams: parseFloat(document.getElementById('pieceWeight').value) || 0,
            printTimeMinutes: parseFloat(document.getElementById('printTime').value) || 0,
            filamentPrice: parseFloat(document.getElementById('filPrice').value) || 0,
            filamentWeight: parseFloat(document.getElementById('filWeight').value) || 1000,
            // Valores fixos (podem vir das configurações da conta no futuro)
            powerConsumption: 150,
            kwhPrice: 0.22,
            machinePrice: 300,
            machineLifeMonths: 24,
            machineHoursPerDay: 12,
            failureRate: 5,
            profitMargin: 50,
            laborFee: 2
        };

        // 2. Chama o motor centralizado
        const res = PrintCalculator.calculate(inputs);

        // 3. Atualiza a UI
        document.getElementById('resMaterial').textContent = '€ ' + res.materialCost.toFixed(2);
        document.getElementById('resEnergy').textContent = '€ ' + res.energyCost.toFixed(2);
        document.getElementById('resTotal').textContent = '€ ' + res.finalPrice.toFixed(2);
    }

    // Inicializa ao carregar
    window.onload = renderCalculation;
</script>

</body>
</html>
