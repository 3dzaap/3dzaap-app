<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DZAAP — Portal do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<script src="i18n.js"></script>
<!-- Theme Init -->
<script>
  (function(){
    var t = localStorage.getItem('3dzaap_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>
/* ── Portal Specific Styles ─────────────────────────────── */
body { 
  background: var(--bg-page); 
  color: var(--black); 
  min-height: 100dvh; 
  display: flex; 
  flex-direction: column;
  -webkit-text-size-adjust: 100%;
}

.portal-container {
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 12px 140px;
  flex: 1;
}

@media (max-width: 480px) {
  .portal-container { padding: 16px 8px 140px; }
}

/* ── Hero Status ─────────────────────────────── */
.hero-status {
  background: linear-gradient(135deg, var(--black) 0%, #1e293b 100%);
  border-radius: var(--rl);
  padding: 32px 24px;
  margin-bottom: 24px;
  text-align: center;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: var(--sh-float);
  animation: fadeUp .6s var(--ease) both;
}
[data-theme="light"] .hero-status {
  background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
}
.hero-status::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(59,143,212,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.1);
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.1);
}
.hero-title {
  font-size: 1.6rem;
  font-weight: 900;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.hero-desc {
  font-size: 0.9rem;
  opacity: 0.8;
  max-width: 480px;
  margin: 0 auto;
  line-height: 1.5;
}

/* ── Progress Tracker ─────────────────────────────── */
.tracker-card {
  background: var(--bg-card-s);
  border: 1.5px solid var(--border-input);
  border-radius: var(--rl);
  padding: 28px 24px;
  margin-bottom: 24px;
  box-shadow: var(--sh-float);
  text-align: center;
}

.tracker-title { 
  font-size: 0.85rem; 
  font-weight: 800; 
  color: var(--subtle); 
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 24px; 
  display: flex; 
  align-items: center; 
  justify-content: center;
  gap: 12px; 
}

@media (max-width: 480px) {
  .tracker-title { font-size: 0.75rem; margin-bottom: 20px; }
}

.steps-container {
  padding: 0 10px;
  margin-bottom: 10px;
}

.steps { 
  display: flex; 
  justify-content: space-between; 
  position: relative; 
  width: 100%;
  padding: 10px 0;
}

.steps::before {
  content: "";
  position: absolute;
  top: 25px;
  left: 20px;
  right: 20px;
  height: 4px;
  background: var(--bg-input);
  z-index: 1;
  border-radius: 4px;
}

.step-line-active {
  position: absolute;
  top: 25px;
  left: 20px;
  right: 20px;
  width: auto;
  height: 4px;
  background: transparent;
  z-index: 2;
  transition: none;
}

.step-line-inner {
  height: 100%;
  background: var(--blue);
  width: 0%;
  border-radius: 4px;
  transition: width .8s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.step { 
  position: relative; 
  z-index: 3; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  gap: 10px; 
  flex: 1;
  min-width: 0;
}

@media (max-width: 580px) {
  .steps-container { padding: 0; }
  .steps { 
    flex-direction: column; 
    gap: 0; 
    align-items: flex-start; 
    padding: 10px 0 10px 20px;
  }
  .steps::before {
    top: 5px;
    bottom: 5px;
    left: 15px;
    width: 4px;
    height: auto;
    right: auto;
    margin: 0;
  }
  .step-line-active {
    top: 5px;
    bottom: 5px;
    left: 15px;
    width: 4px;
    height: auto;
    right: auto;
    margin: 0;
  }
  .step-line-inner {
    width: 100% !important;
    height: 0%;
    transition: height .8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .step {
    flex-direction: row;
    gap: 16px;
    padding: 15px 0;
    align-items: center;
    width: 100%;
    justify-content: flex-start;
  }
  .step-dot {
    flex-shrink: 0;
    width: 32px !important;
    height: 32px !important;
    z-index: 5;
  }
  .step-lbl {
    text-align: left !important;
    font-size: 0.85rem !important;
  }
}

.step-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg-card-s);
  border: 3px solid var(--bg-input);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: all .4s var(--ease);
  box-shadow: var(--sh);
}

.step.active .step-dot { 
  border-color: var(--blue); 
  background: var(--blue); 
  color: #fff; 
  box-shadow: 0 0 15px rgba(59,143,212,.4);
  transform: scale(1.1);
}

.step.done .step-dot { 
  border-color: var(--blue); 
  background: var(--bg-card-s); 
  color: var(--blue); 
}

.step-lbl { 
  font-size: .58rem; 
  font-weight: 800; 
  color: var(--subtle); 
  text-transform: uppercase; 
  letter-spacing: .4px; 
  text-align: center;
  transition: color .3s;
  line-height: 1.2;
}

.step.active .step-lbl { color: var(--blue); }
.step.done .step-lbl { color: var(--dark); }

/* ── Modal Details ─────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(13, 17, 23, 0.8);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 1000;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal-content {
  width: 100%;
  max-width: 700px;
  animation: modalIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  margin-top: 20px;
}
  from { opacity: 0; transform: translateY(40px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-content {
  background: var(--bg-card);
  width: 100%;
  max-width: 680px;
  border-radius: 28px;
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 30px 60px rgba(0,0,0,0.5);
  animation: modalIn .4s var(--ease);
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border-input);
}

.modal-header {
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-card-s);
  border-bottom: 1.5px solid var(--border-input);
  z-index: 10;
}

.modal-close-btn {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  background: var(--bg-input);
  border: 1.5px solid var(--border-input);
  color: var(--black);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.2rem;
  transition: all 0.2s var(--ease);
}
.modal-close-btn:hover { background: var(--bg-card-s); transform: scale(1.1); }
.modal-close-btn:active { transform: scale(0.9); }

.modal-body {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

.modal-footer {
  padding: 16px 20px;
  background: var(--bg-card-s);
  border-top: 1.5px solid var(--border-input);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Receipt Card Styles (In-Modal) ── */
.rcpt-card {
  background: var(--bg-card-s);
  border-radius: var(--rl);
  width: 100%;
  box-shadow: var(--sh-float);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1.5px solid var(--border-input);
}

.rcpt-header { 
  background: #0D1117; 
  padding: 24px 20px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  gap: 16px;
}
[data-theme="dark"] .rcpt-header { background: #1e293b; }
@media (max-width: 580px) {
  .rcpt-header { flex-direction: column; text-align: center; padding: 24px 16px; }
  .rcpt-header-right { text-align: center; }
}

.rcpt-logo img { height: 44px; width: auto; object-fit: contain; border-radius: 20%; }
.rcpt-header-right { text-align: right; color: #fff; }
.rcpt-title { font-size: .65rem; font-weight: 800; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: 2px; }
.rcpt-number { font-family: var(--mono); font-size: 1.3rem; font-weight: 800; margin-top: 4px; }
.rcpt-date { font-size: 0.75rem; opacity: 0.8; margin-top: 4px; }

.rcpt-status-bar { padding: 10px 20px; font-size: .7rem; font-weight: 700; display: flex; align-items: center; justify-content: space-between; gap: 8px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }
.rcpt-status-bar.paid { background: rgba(34,197,94,0.12); color: #16a34a; }
.rcpt-status-bar.pending { background: rgba(245,158,11,0.12); color: #d97706; }
.rcpt-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; display: inline-block; margin-right: 6px; }

.rcpt-body { padding: 24px 20px; }
@media (max-width: 480px) { .rcpt-body { padding: 20px 12px; } }

.rcpt-section-label { 
  font-size: .68rem; 
  font-weight: 900; 
  color: var(--subtle); 
  text-transform: uppercase; 
  letter-spacing: 1.2px; 
  margin: 24px 0 12px; 
  border-bottom: 1px solid var(--border-input); 
  padding-bottom: 8px; 
  display: flex;
  align-items: center;
  gap: 8px;
}
.rcpt-section-label:first-child { margin-top: 0; }

.rcpt-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 12px 0; }
.rcpt-table { width: 100%; border-collapse: collapse; }
.rcpt-table th { text-align: left; font-size: .65rem; font-weight: 800; color: var(--subtle); padding: 8px 10px; background: var(--bg-table-head); }
.rcpt-table td { padding: 12px 10px; border-bottom: 1px solid var(--border-input); font-size: .84rem; color: var(--black); }
.rcpt-table td.r { text-align: right; font-family: var(--mono); font-size: .78rem; white-space: nowrap; }
.rcpt-table td.bold { font-weight: 800; text-align: right; white-space: nowrap; }

.rcpt-grand { 
  background: var(--black); 
  color: #fff; 
  padding: 14px 20px; 
  border-radius: 12px; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  margin-top: 20px; 
}
[data-theme="dark"] .rcpt-grand { background: #0c1e38; }
.rcpt-grand-lbl { font-size: .75rem; font-weight: 700; opacity: .8; }
.rcpt-grand-val { font-size: 1.3rem; font-weight: 900; font-family: var(--mono); }

.rcpt-sig-row { display: flex; justify-content: space-between; align-items: flex-end; padding: 24px 20px 0; }
.rcpt-sig-block { text-align: center; min-width: 160px; }
.rcpt-sig-img { max-height: 50px; margin-bottom: 4px; display: block; margin-left: auto; margin-right: auto; }
.rcpt-sig-line { height: 1px; background: #cbd5e1; margin-bottom: 4px; }
.rcpt-sig-name { font-size: .65rem; font-weight: 700; color: #475569; text-transform: uppercase; }
.rcpt-sig-location { font-size: .6rem; color: #94a3b8; margin-top: 2px; }

.rcpt-footer { margin-top: 32px; padding: 20px 20px 40px; border-top: 1px solid var(--border); color: var(--muted); font-size: .7rem; display: flex; justify-content: space-between; align-items: center; }
.rcpt-brand { font-weight: 900; font-family: 'Outfit', sans-serif; letter-spacing: -0.5px; font-size: 1.1rem; display: flex; align-items: center; gap: 4px; }
.rcpt-brand .b3d { color: var(--blue); }
.rcpt-brand .bzp { color: var(--orange); }

/* ── Actions Bar ─────────────────────────────── */
.portal-actions {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-card-s);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1.5px solid var(--border-input);
  padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0px));
  display: flex;
  gap: 12px;
  justify-content: stretch;
  z-index: 100;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.08);
}

.btn-portal {
  flex: 1;
  height: 50px;
  border-radius: 14px;
  font-size: 0.9rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: all .2s var(--ease);
  border: none;
  -webkit-appearance: none;
}
.btn-approve { background: var(--success); color: #fff; box-shadow: 0 6px 16px rgba(34,197,94,.3); }
.btn-decline { background: var(--bg-input); border: 1.5px solid var(--border-input); color: var(--danger); }
.btn-print { background: var(--bg-btn-ghost); border: 1.5px solid var(--border-input); color: var(--black); }

/* ── PIN Entry Screen ─────────────────────────────── */
.pin-overlay {
  position: fixed;
  inset: 0;
  z-index: 1001;
  background: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.pin-card {
  background: var(--bg-card-s);
  border: 1.5px solid var(--border-input);
  border-radius: var(--rx);
  padding: 40px 24px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: var(--sh-float);
}

.pin-input-group { display: flex; justify-content: center; gap: 14px; margin-bottom: 32px; }
.pin-field {
  width: 50px; height: 64px; background: var(--bg-input);
  border: 2px solid rgba(148, 163, 184, 0.4);
  border-radius: var(--r); font-size: 1.6rem; font-weight: 800;
  text-align: center; color: var(--black); -webkit-appearance: none;
}
.pin-field:focus { border-color: var(--blue); background: var(--bg-card-s); outline: none; transform: translateY(-2px); }

/* ── Loading, Errors & Animations ─────────────────────────────── */
.portal-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh; gap: 20px; color: var(--subtle); }
.spinner { width: 40px; height: 40px; border: 4px solid var(--bg-input); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
.animate { animation: fadeUp .6s var(--ease) forwards; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 75% { transform: translateX(8px); } }
.shake { animation: shake .4s var(--ease); }

</style>
</head>
<body class="animate">

<div class="portal-container" id="portalContent">
  <div class="portal-loading" id="loadingState">
    <div class="spinner"></div>
    <p data-i18n="portal.loading">A carregar o seu pedido...</p>
  </div>
</div>

<div class="modal-overlay" id="detailsModal" onclick="if(event.target===this)toggleDetails()">
  <div class="modal-content">
    <div class="modal-header">
      <div style="color:var(--black);font-weight:900;font-size:1.1rem;letter-spacing:-0.5px" data-i18n="portal.rcpt_title_os">Ordem de Serviço</div>
      <button class="modal-close-btn" onclick="toggleDetails()"><i class="ph-bold ph-x"></i></button>
    </div>
    
    <div class="modal-body">
      <div class="rcpt-card" id="printableReceipt">
        <!-- Populated dynamically -->
      </div>
    </div>

    <div class="modal-footer">
       <button class="btn btn-primary" onclick="printPortalReceipt()" style="width:100%; height:52px; border-radius:14px; font-weight:800; font-size:1rem">
         <i class="ph-bold ph-download-simple"></i> <span data-i18n="portal.btn_download_pdf">Descarregar PDF</span>
       </button>
       <button class="btn-portal btn-print" onclick="toggleDetails()" style="height:48px; border:none; background:transparent; font-size:0.85rem; font-weight:700; color:var(--subtle)">
         <span data-i18n="portal.btn_close">Fechar</span>
       </button>
    </div>
  </div>
</div>

<!-- PIN Overlay -->
<div class="pin-overlay" id="pinOverlay" style="display:none">
  <div class="pin-card" id="pinCard">
    <div class="pin-icon" style="font-size:3.5rem;margin-bottom:24px"><i class="ph-bold ph-lock-key"></i></div>
    <div class="pin-title" style="font-size:1.4rem;font-weight:900;margin-bottom:12px" data-i18n="portal.pin_title">Acesso Restrito</div>
    <div class="pin-desc" style="font-size:.9rem;color:var(--subtle);margin-bottom:32px;line-height:1.6" data-i18n="portal.pin_desc">Insira o código de 4 dígitos enviado pelo WhatsApp para ver os detalhes.</div>
    <div class="pin-input-group">
      <input type="password" maxlength="1" class="pin-field" id="p1" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p2" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p3" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p4" inputmode="numeric">
    </div>
    <p id="pinError" style="color:var(--danger);font-size:.8rem;font-weight:600;display:none;margin-top:-10px;margin-bottom:10px" data-i18n="portal.pin_err">Código incorreto. Tente novamente.</p>
  </div>
</div>

<!-- Actions Bar -->
<div class="portal-actions" id="actionsBar" style="display:none"></div>

<script>
const t = (k, v, vars) => window.i18n ? window.i18n.getNestedTranslation(k, vars, v) : v;
let _order = null;
let _company = null;
const _token = new URLSearchParams(window.location.search).get('t');

async function init() {
  if (window.i18n) await window.i18n.init();
  if (!_token) {
    renderError(t('portal.err_secure_title'), t('portal.err_token_desc'), '<i class="ph-bold ph-magnifying-glass"></i>');
    return;
  }
  try {
    const data = await DB.getTrackingInfo(_token);
    _order = data.order;
    _company = data;
    const storedPin = sessionStorage.getItem('3dzaap_portal_pin_' + _token);
    if (_order.passphrase && _order.passphrase !== storedPin) {
      showPinScreen();
    } else if (!_order.passphrase) {
      renderError(t('portal.err_secure_title', 'Acesso Restrito'), t('portal.err_secure_desc', 'Por favor, use o link oficial enviado pela loja.'), '<i class="ph-bold ph-lock"></i>');
    } else {
      renderPortal();
    }
  } catch (err) {
    renderError('Erro', err.message, '<i class="ph-bold ph-x-circle"></i>');
  }
}

function showPinScreen() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('pinOverlay').style.display = 'flex';
  const inputs = document.querySelectorAll('.pin-field');
  inputs.forEach((input, idx) => {
    input.addEventListener('input', (e) => {
      if (e.target.value.length === 1 && idx < inputs.length - 1) inputs[idx + 1].focus();
      checkFullPin();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && idx > 0) inputs[idx - 1].focus();
    });
  });
  inputs[0].focus();
}

function checkFullPin() {
  const inputs = document.querySelectorAll('.pin-field');
  const pin = Array.from(inputs).map(i => i.value).join('');
  if (pin.length === 4) {
    if (pin === _order.passphrase) {
      sessionStorage.setItem('3dzaap_portal_pin_' + _token, pin);
      document.getElementById('pinOverlay').style.display = 'none';
      renderPortal();
    } else {
      const card = document.getElementById('pinCard');
      card.classList.add('shake');
      document.getElementById('pinError').style.display = 'block';
      inputs.forEach(i => i.value = '');
      inputs[0].focus();
      setTimeout(() => card.classList.remove('shake'), 400);
    }
  }
}

function renderPortal() {
  const container = document.getElementById('portalContent');
  const actions = document.getElementById('actionsBar');
  
  let html = renderHeroStatus();
  if (_order.status !== 'declined') html += renderTracker();

  // "View Details" trigger
  html += `
    <div style="text-align:center; padding: 10px 0 20px">
      <button class="btn btn-ghost" onclick="toggleDetails()" style="font-weight:700; gap:8px; border:1.5px solid var(--border-input); background:var(--bg-card-s); padding: 10px 20px">
        <i class="ph-bold ph-receipt"></i> ${t('portal.btn_view_details', 'Ver Detalhes do Pedido')}
      </button>
    </div>
  `;

  container.innerHTML = html;
  updateReceiptModal();
  renderButtons();
  actions.style.display = 'flex';
}

function renderHeroStatus() {
  const s = _order.status;
  let title = t('status.' + s, s);
  let desc = t('portal.desc_' + s, '');

  if (s === 'orcamento') {
    title = t('portal.hero_title_quote', 'Pedido Recebido');
    desc = t('portal.hero_desc_quote', 'A sua solicitação foi recebida e está a ser analisada.');
  } else if (s === 'modelagem') {
    title = t('portal.hero_title_modelagem', 'Design e Preparação');
    desc = t('portal.hero_desc_modelagem', 'Estamos a preparar os seus ficheiros para impressão.');
  } else if (s === 'validacao') {
    title = t('portal.hero_title_validation', 'Aguardando Aprovação');
    desc = t('portal.hero_desc_validation', 'O orçamento/modelo está pronto. Por favor, valide para continuarmos.');
  } else if (s === 'aprovado' || s === 'fila') {
    title = t('portal.hero_title_approved', 'Pedido Confirmado');
    desc = t('portal.hero_desc_approved', 'O seu pedido foi aprovado e entrará em produção em breve.');
  } else if (s === 'printing') {
    title = t('portal.hero_title_printing', 'Em Produção');
    desc = t('portal.hero_desc_printing', 'As nossas máquinas estão a trabalhar no seu projeto agora!');
  } else if (s === 'shipping') {
    title = t('portal.hero_title_shipping', 'Pedido Enviado!');
    desc = t('portal.hero_desc_shipping', 'O seu pedido já foi expedido. Verifique o link de rastreio.');
  } else if (s === 'done') {
    title = t('portal.hero_title_done', 'Pedido Concluído!');
    desc = t('portal.hero_desc_done', 'O seu pedido já está pronto e finalizado.');
  }

  return `
    <div class="hero-status">
      <div class="hero-badge"><i class="ph-bold ph-info"></i> ${t('portal.badge_status', 'ESTADO')}</div>
      <div class="hero-title">${title}</div>
      <div class="hero-desc">${desc}</div>
    </div>
  `;
}

function toggleDetails() {
  const modal = document.getElementById('detailsModal');
  modal.classList.toggle('open');
  document.body.style.overflow = modal.classList.contains('open') ? 'hidden' : '';
}

        <div class="rcpt-number">${_order.orderNumber}</div>
        <div class="rcpt-date">${new Date().toLocaleDateString('pt-PT')}</div>
      </div>
    </div>

       </div>
       <div style="font-weight:800; opacity:0.9">
         ${t('portal.order_status', 'ESTADO')}: ${t('status.'+_order.status, _order.status).toUpperCase()}
       </div>

    <div class="rcpt-body">
      <div class="rcpt-section-label">${t('portal.client_data', 'Dados do Cliente')}</div>

        <div><div style="font-size:.65rem; color:var(--subtle); font-weight:800">${t('portal.lbl_name', 'NOME')}</div><div style="font-weight:700; font-size:1rem">${_order.clientName}</div></div>
        <div><div style="font-size:.65rem; color:var(--subtle); font-weight:800">${t('portal.lbl_created_at', 'DATA')}</div><div style="font-weight:700; font-size:1rem">${new Date(_order.createdAt).toLocaleDateString('pt-PT')}</div></div>

      <div class="rcpt-section-label">${t('portal.order_items', 'Itens do Pedido')}</div>
      <div class="rcpt-table-wrap">
        <table class="rcpt-table">
          <thead>
            <tr>
              <th>${t('portal.th_desc', 'DESCRIÇÃO')}</th>
              <th style="text-align:right">${t('portal.th_qty', 'QTD')}</th>
              <th style="text-align:right">${t('portal.th_price', 'PREÇO UNIT.')}</th>

          <tbody>

                <td class="r bold">${fmtCurrency((it.quantity||1)*(it.unitPrice||0))}</td>

          </tbody>

      </div>
      <div class="rcpt-grand">

      </div>
      ${_order.notes ? `

      <div class="rcpt-sig-row">

function renderTracker() {
  const steps = [
    { k: 'orcamento',  l: t('portal.tracker_step_1', 'Orçamento'), i: '<i class="ph-bold ph-hourglass"></i>' },
    { k: 'modelagem',  l: t('portal.tracker_step_2', 'Modelagem'), i: '<i class="ph-bold ph-ruler"></i>' },
    { k: 'validacao',  l: t('portal.tracker_step_3', 'Aprovação'), i: '<i class="ph-bold ph-check-circle"></i>' },
    { k: 'fila',       l: t('portal.tracker_step_4', 'Em Fila'), i: '<i class="ph-bold ph-package"></i>' },
    { k: 'printing',   l: t('portal.tracker_step_5', 'Produção'), i: '<i class="ph-bold ph-printer"></i>' },
    { k: 'preparacao', l: t('portal.tracker_step_6', 'Expedição'), i: '<i class="ph-bold ph-rocket-launch"></i>' },
    { k: 'done',       l: t('portal.tracker_step_7', 'Concluído'), i: '<i class="ph-bold ph-flag-checkered"></i>' }
  ];
  
  const s = _order.status;
  let stepIdx = 0;
  if (s === 'modelagem') stepIdx = 1;
  else if (s === 'validacao') stepIdx = 2;
  else if (s === 'aprovado' || s === 'fila') stepIdx = 3;
  else if (s === 'printing') stepIdx = 4;
  else if (s === 'preparacao' || s === 'enviado') stepIdx = 5;
  else if (s === 'done') stepIdx = 6;
  
  const stepPercent = (stepIdx / (steps.length - 1)) * 100;
  let stepsHtml = steps.map((st, i) => {
    let cls = i === stepIdx ? 'active' : (i < stepIdx ? 'done' : '');
    return `<div class="step ${cls}"><div class="step-dot">${st.i}</div><div class="step-lbl">${st.l}</div></div>`;
  }).join('');

  return `
    <div class="tracker-card">
      <div class="tracker-title"><i class="ph-bold ph-rocket-launch"></i> ${t('portal.tracker_title', 'ESTADO DA PRODUÇÃO')}</div>
      <div class="steps-container">
        <div class="steps"><div class="step-line-active"><div class="step-line-inner" style="width: ${stepPercent}%"></div></div>${stepsHtml}</div>
      </div>
      <div style="text-align:center;font-size:.85rem;color:var(--subtle);margin-top:24px;font-weight:700">
        ${t('portal.curr_status', 'STATUS ATUAL')}: <strong style="color:var(--blue)">${(steps[stepIdx].l).toUpperCase()}</strong>
      </div>
    </div>
  `;
}

function renderButtons() {
  const bar = document.getElementById('actionsBar');
  let html = '';
  const s = _order.status;
  
  if (s === 'orcamento') {
    html += `<button class="btn-portal btn-decline" onclick="handleAction('decline')"><i class="ph-bold ph-x-circle"></i> ${t('portal.btn_decline', 'Recusar')}</button>
             <button class="btn-portal btn-approve" onclick="handleAction('approve')"><i class="ph-bold ph-check-circle"></i> ${t('portal.btn_approve_budget', 'Aprovar Orçamento')}</button>`;
  } else if (s === 'validacao') {
    html += `<button class="btn-portal btn-decline" onclick="handleAction('decline')"><i class="ph-bold ph-x-circle"></i> ${t('portal.btn_reject_model', 'Alterações')}</button>
             <button class="btn-portal btn-approve" onclick="handleAction('approve')"><i class="ph-bold ph-check-circle"></i> ${t('portal.btn_approve_final', 'Confirmar Produção')}</button>`;
  } else if (s === 'declined') {
    html += `<div style="color:var(--danger);font-weight:700;width:100%;text-align:center">${t('portal.status_declined_msg', 'Pedido Cancelado')}</div>`;
  } else {
    html += `<button class="btn-portal btn-print" onclick="toggleDetails()"><i class="ph-bold ph-receipt"></i> ${t('portal.btn_view_details', 'Ver Detalhes')}</button>
             <button class="btn-portal btn-approve" onclick="notifyOwner()" style="background:#25D366"><i class="ph-bold ph-whatsapp-logo"></i> ${t('portal.btn_whatsapp', 'WhatsApp')}</button>`;
  }
  bar.innerHTML = html;
}

async function handleAction(action) {
  if (action === 'approve' && !window.confirm(t('portal.confirm_approve', 'Deseja confirmar esta ação?'))) return;
  try {
    const btn = document.querySelector('.btn-approve');
    if (btn) { btn.disabled = true; btn.innerHTML = '...'; }
    await DB.respondToQuote(_token, action);
    window.location.reload();
  } catch (err) { alert('Erro: ' + err.message); }
}

function notifyOwner() {
  const phone = (_company.companyConfig?.cPhone || '').replace(/\D/g, '');
  const msg = encodeURIComponent(`Olá! Vi o estado do meu pedido ${_order.orderNumber} no portal e gostaria de falar consigo.`);
  window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
}

async function printPortalReceipt() {
  try {
    await downloadPDF('printableReceipt', `OS_${_order.orderNumber}.pdf`);
  } catch (err) { alert(t('portal.err_pdf', 'Erro ao gerar PDF.')); }
}

function renderError(title, msg, icon) {
  document.getElementById('portalContent').innerHTML = `
    <div class="portal-error" style="text-align:center;padding:60px 24px">
      <div style="font-size:4rem;margin-bottom:24px">${icon}</div>
      <h1>${title}</h1>
      <p style="color:var(--muted);margin:10px 0">${msg}</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:24px;display:inline-flex">${t('portal.btn_back', 'Voltar')}</a>
    </div>`;
}

init();
</script>
</body>
</html>
