<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DZAAP — Portal do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link rel="stylesheet" href="shared.css">
<style>
/* ── Portal Specific Styles ─────────────────────────────── */
body { background: var(--bg); min-height: 100dvh; display: flex; flex-direction: column; }

.portal-container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 16px 100px;
  flex: 1;
}

/* ── Progress Tracker ─────────────────────────────── */
.tracker-card {
  background: var(--bg-card-s);
  border: 1.5px solid var(--border);
  border-radius: var(--rl);
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: var(--sh-float);
}

.tracker-title { font-size: 1.1rem; font-weight: 800; color: var(--dark); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

.steps { display: flex; justify-content: space-between; position: relative; margin-bottom: 10px; }
.steps::before {
  content: "";
  position: absolute;
  top: 15px;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--border);
  z-index: 1;
}

.step-line-active {
  position: absolute;
  top: 15px;
  left: 0;
  height: 4px;
  background: var(--blue);
  z-index: 2;
  width: 0%;
  transition: width .6s var(--ease);
}

.step { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 60px; }
.step-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .9rem;
  transition: all .3s var(--ease);
}
.step.active .step-dot { border-color: var(--blue); background: var(--blue); color: #fff; box-shadow: 0 0 12px rgba(59,143,212,.4); }
.step.done .step-dot { border-color: var(--blue); background: var(--bg); color: var(--blue); }
.step-lbl { font-size: .65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; text-align: center; }
.step.active .step-lbl { color: var(--blue); }

/* ── Receipt View ─────────────────────────────── */
/* Extracted from orders.html with portal-specific tweaks */
.rcpt-modal {
  background: var(--bg-card-s);
  border-radius: var(--rl);
  width: 100%;
  box-shadow: var(--sh-float);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1.5px solid var(--border);
}

.rcpt-header { background: linear-gradient(135deg,#0D1117 0%,#162032 100%); padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; }
.rcpt-logo img { height: 42px; width: auto; }
.rcpt-header-right { text-align: right; color: #fff; }
.rcpt-title { font-size: .65rem; font-weight: 700; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: 2px; }
.rcpt-number { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 700; margin-top: 2px; }

.rcpt-body { padding: 24px 28px; }
.rcpt-section-label { font-size: .65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 16px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.rcpt-section-label:first-child { margin-top: 0; }

.rcpt-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.rcpt-table th { text-align: left; font-size: .65rem; font-weight: 800; color: var(--muted); padding: 8px; background: var(--bg-hover-s); border-radius: 4px; }
.rcpt-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: .85rem; color: var(--dark); }
.rcpt-table td.r { text-align: right; font-family: 'JetBrains Mono'; font-size: .8rem; }
.rcpt-table td.bold { font-weight: 700; text-align: right; }

.rcpt-grand { background: #0D1117; color: #fff; padding: 14px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
.rcpt-grand-lbl { font-size: .8rem; font-weight: 600; opacity: .7; }
.rcpt-grand-val { font-size: 1.4rem; font-weight: 800; font-family: 'JetBrains Mono'; }

/* ── Actions Bar ─────────────────────────────── */
.portal-actions {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-card-s);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1.5px solid var(--border);
  padding: 16px 20px 24px;
  display: flex;
  gap: 12px;
  justify-content: center;
  z-index: 100;
}

.btn-portal {
  flex: 1;
  max-width: 240px;
  height: 48px;
  border-radius: 14px;
  font-size: .95rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: all .2s var(--ease);
  border: none;
}

.btn-approve { background: var(--green); color: #fff; box-shadow: 0 4px 12px rgba(22,163,74,.3); }
.btn-approve:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(22,163,74,.4); }
.btn-decline { background: rgba(239,68,68,.1); color: var(--danger); border: 1.5px solid rgba(239,68,68,.2); }
.btn-print { background: var(--bg-btn-ghost); border: 1.5px solid var(--border); color: var(--dark); }

/* ── PIN Entry Screen ─────────────────────────────── */
.pin-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.pin-card {
  background: var(--bg-card-s);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1.5px solid var(--border);
  border-radius: var(--rl);
  padding: 40px 30px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  box-shadow: var(--sh-float);
}

.pin-icon { font-size: 3rem; margin-bottom: 20px; }
.pin-title { font-size: 1.25rem; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
.pin-desc { font-size: .88rem; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }

.pin-input-group {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 24px;
}

.pin-field {
  width: 50px;
  height: 60px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 1.5rem;
  font-weight: 700;
  text-align: center;
  color: var(--dark);
  transition: all .2s var(--ease);
}

.pin-field:focus {
  border-color: var(--blue);
  background: var(--bg-card);
  box-shadow: 0 0 0 4px rgba(59,143,212,.15);
  outline: none;
}

/* ── Loading & Errors ─────────────────────────────── */
.portal-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.portal-error { text-align: center; padding: 40px 20px; }
.error-icon { font-size: 3rem; margin-bottom: 20px; }

/* ── Animations ─────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.animate { animation: fadeIn .4s var(--ease) forwards; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
.shake { animation: shake .4s var(--ease); }

</style>
</head>
<body class="animate">

<div class="portal-container" id="portalContent">
  <!-- Loading State -->
  <div class="portal-loading" id="loadingState">
    <div class="spinner"></div>
    <p>A carregar o seu pedido...</p>
  </div>
</div>

<!-- PIN Overlay (Hidden by default) -->
<div class="pin-overlay" id="pinOverlay" style="display:none">
  <div class="pin-card" id="pinCard">
    <div class="pin-icon">🔐</div>
    <div class="pin-title">Acesso Restrito</div>
    <div class="pin-desc">Insira o código de 4 dígitos enviado pelo WhatsApp para ver os detalhes.</div>
    <div class="pin-input-group">
      <input type="password" maxlength="1" class="pin-field" id="p1" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p2" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p3" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p4" inputmode="numeric">
    </div>
    <p id="pinError" style="color:var(--danger);font-size:.8rem;font-weight:600;display:none;margin-top:-10px;margin-bottom:10px">Código incorreto. Tente novamente.</p>
  </div>
</div>

<!-- Actions Bar -->
<div class="portal-actions" id="actionsBar" style="display:none">
  <!-- Dynamic buttons based on status -->
</div>

<script>
let _order = null;
let _company = null;
const _token = new URLSearchParams(window.location.search).get('t');

async function init() {
  if (!_token) {
    renderError('Link inválido', 'Não forneceu o token de acesso necessário.', '🔍');
    return;
  }

  try {
    const data = await DB.getTrackingInfo(_token);
    _order = data.order;
    _company = data;
    
    // Check if we already have a valid PIN in session
    const storedPin = sessionStorage.getItem('3dzaap_portal_pin_' + _token);
    if (_order.passphrase && _order.passphrase !== storedPin) {
      showPinScreen();
    } else {
      renderPortal();
    }
  } catch (err) {
    renderError('Não encontrado', err.message, '📄');
  }
}

function showPinScreen() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('pinOverlay').style.display = 'flex';
  
  const inputs = document.querySelectorAll('.pin-field');
  inputs.forEach((input, idx) => {
    input.addEventListener('input', (e) => {
      if (e.target.value.length === 1 && idx < inputs.length - 1) {
        inputs[idx + 1].focus();
      }
      checkFullPin();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && idx > 0) {
        inputs[idx - 1].focus();
      }
    });
  });
  inputs[0].focus();
}

function checkFullPin() {
  const inputs = document.querySelectorAll('.pin-field');
  const pin = Array.from(inputs).map(i => i.value).join('');
  if (pin.length === 4) {
    if (pin === _order.passphrase) {
      sessionStorage.setItem('3dzaap_portal_pin_' + _token, pin);
      document.getElementById('pinOverlay').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('pinOverlay').style.display = 'none';
        renderPortal();
      }, 300);
    } else {
      const card = document.getElementById('pinCard');
      const err = document.getElementById('pinError');
      card.classList.add('shake');
      err.style.display = 'block';
      inputs.forEach(i => i.value = '');
      inputs[0].focus();
      setTimeout(() => card.classList.remove('shake'), 400);
    }
  }
}

function renderPortal() {
  const container = document.getElementById('portalContent');
  const actions = document.getElementById('actionsBar');
  
  // Decide what to show
  let html = '';
  
  const productionStates = ['aprovado', 'modelagem', 'printing', 'done'];
  
  // 1. Tracker Section (Production States)
  if (productionStates.includes(_order.status)) {
    html += renderTracker();
  }

  // 2. Receipt Card
  html += `
    <div class="rcpt-modal">
      <div class="rcpt-header">
        <div class="rcpt-logo">
          ${_company.logoUrl ? `<img src="${_company.logoUrl}">` : `<span style="color:#fff;font-weight:800;font-size:1.2rem">${_company.companyName}</span>`}
        </div>
        <div class="rcpt-header-right">
          <div class="rcpt-title">${['orcamento', 'validacao'].includes(_order.status) ? 'Orçamento Profissional' : 'Recibo / Pedido'}</div>
          <div class="rcpt-number">${_order.orderNumber}</div>
        </div>
      </div>
      
      <div class="rcpt-body">
        <div class="rcpt-section-label">👤 Dados do Cliente</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          <div>
            <div style="font-size:.65rem;color:var(--muted);font-weight:700">NOME</div>
            <div style="font-weight:600;font-size:.9rem">${_order.clientName}</div>
          </div>
          <div>
            <div style="font-size:.65rem;color:var(--muted);font-weight:700">DATA</div>
            <div style="font-weight:600;font-size:.9rem">${new Date(_order.createdAt).toLocaleDateString('pt-PT')}</div>
          </div>
        </div>

        <div class="rcpt-section-label">📦 Itens Impressos</div>
        <table class="rcpt-table">
          <thead>
            <tr>
              <th>Descrição</th>
              <th style="width:60px;text-align:right">Qtd</th>
              <th style="width:100px;text-align:right">Total</th>
            </tr>
          </thead>
          <tbody>
            ${_order.items.map(item => `
              <tr>
                <td>
                  <strong>${item.description}</strong><br>
                  <span style="font-size:.7rem;color:var(--muted)">${item.material || 'N/A'} — ${item.weight || 0}g</span>
                </td>
                <td class="r">${item.qty}</td>
                <td class="r bold">${parseFloat(item.total).toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}€</td>
              </tr>
            `).join('')}
          </tbody>
        </table>

        <div class="rcpt-grand">
          <div class="rcpt-grand-lbl">VALOR TOTAL ESTIMADO</div>
          <div class="rcpt-grand-val">${parseFloat(_order.total).toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}€</div>
        </div>
        
        ${_order.notes ? `
          <div class="rcpt-section-label">📌 Observações</div>
          <div style="font-size:.8rem;color:var(--muted);line-height:1.5">${_order.notes}</div>
        ` : ''}
      </div>
    </div>
  `;

  container.innerHTML = html;
  
  // 3. Render Buttons
  renderButtons();
  actions.style.display = 'flex';
}

function renderTracker() {
  const statuses = ['orcamento', 'aprovado', 'modelagem', 'printing', 'done'];
  const labels = ['Análise', 'Confirmado', 'Modelagem', 'Impressão', 'Pronto'];
  const icons = ['⏳', '📦', '📐', '🖨️', '✅'];
  
  // Current status index
  let currentIdx = statuses.indexOf(_order.status);
  if (currentIdx === -1) {
    if (_order.status === 'validacao') currentIdx = 0;
    else currentIdx = 1; // Default to confirmed
  }
  
  const stepPercent = (currentIdx / (statuses.length - 1)) * 100;

  let stepsHtml = '';
  labels.forEach((lbl, i) => {
    let cls = '';
    if (i === currentIdx) cls = 'active';
    else if (i < currentIdx) cls = 'done';
    
    stepsHtml += `
      <div class="step ${cls}">
        <div class="step-dot">${icons[i]}</div>
        <div class="step-lbl">${lbl}</div>
      </div>
    `;
  });

  return `
    <div class="tracker-card">
      <div class="tracker-title">🚀 Acompanhamento do Pedido</div>
      <div class="steps">
        <div class="step-line-active" style="width: ${stepPercent}%"></div>
        ${stepsHtml}
      </div>
      <div style="text-align:center;font-size:.8rem;color:var(--muted);margin-top:20px;font-weight:500">
        Status Atual: <strong style="color:var(--blue)">${labels[currentIdx].toUpperCase()}</strong>
      </div>
    </div>
  `;
}

function renderButtons() {
  const bar = document.getElementById('actionsBar');
  let html = '';
  
  const decisionStates = ['orcamento', 'validacao'];
  
  if (decisionStates.includes(_order.status)) {
    html += `
      <button class="btn-portal btn-decline" onclick="handleAction('decline')">❌ Declinar</button>
      <button class="btn-portal btn-approve" onclick="handleAction('approve')">✅ Aprovar Orçamento</button>
    `;
  } else if (_order.status === 'declined') {
    html += `<div style="color:var(--danger);font-weight:700">Orçamento foi declinado.</div>`;
  } else {
    // Production/Tracking view
    html += `
      <button class="btn-portal btn-print" onclick="window.print()">🖨️ PDF / Recibo</button>
      <button class="btn-portal btn-approve" onclick="notifyOwner()" style="background:var(--blue)">📱 Contactar WhatsApp</button>
    `;
  }
  
  bar.innerHTML = html;
}

async function handleAction(action) {
  if (action === 'approve') {
    const confirm = window.confirm('Ao aprovar, confirma os detalhes deste orçamento e autoriza o início da produção. Vamos avançar?');
    if (!confirm) return;
  }
  
  try {
    const btn = (action === 'approve') ? document.querySelector('.btn-approve') : document.querySelector('.btn-decline');
    if (btn) { btn.disabled = true; btn.innerHTML = '⏳...'; }
    
    await DB.respondToQuote(_token, action);
    
    if (action === 'approve') {
      alert('Orçamento Aprovado com sucesso! Agora pode acompanhar a produção através deste mesmo link.');
      window.location.reload();
    } else {
      alert('Orçamento declinado.');
      window.location.reload();
    }
  } catch (err) {
    alert('Erro: ' + err.message);
  }
}

function notifyOwner() {
  const phone = _company.companyConfig?.cPhone || '';
  const cleanPhone = phone.replace(/\D/g, '');
  const msg = encodeURIComponent(`Olá! Vi o estado do meu pedido ${_order.orderNumber} no portal e gostaria de falar consigo.`);
  window.open(`https://wa.me/${cleanPhone}?text=${msg}`, '_blank');
}

function renderError(title, msg, icon) {
  document.getElementById('portalContent').innerHTML = `
    <div class="portal-error">
      <div class="error-icon">${icon}</div>
      <h1>${title}</h1>
      <p style="color:var(--muted);max-width:300px;margin:10px auto">${msg}</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:24px;display:inline-flex">Voltar ao site</a>
    </div>
  `;
}

init();
</script>
</body>
</html>
