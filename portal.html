<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DZAAP — Portal do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<!-- Theme Init -->
<script>
  (function(){
    var t = localStorage.getItem('3dzaap_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="stylesheet" href="shared.css">
<style>
/* ── Portal Specific Styles ─────────────────────────────── */
body { 
  background: var(--bg-page); 
  color: var(--black); 
  min-height: 100dvh; 
  display: flex; 
  flex-direction: column;
}

.portal-container {
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 16px 120px;
  flex: 1;
}

/* ── Progress Tracker ─────────────────────────────── */
.tracker-card {
  background: var(--bg-card-s);
  border: 1.5px solid var(--border-input);
  border-radius: var(--rl);
  padding: 32px 24px;
  margin-bottom: 28px;
  box-shadow: var(--sh-float);
  text-align: center;
}

.tracker-title { 
  font-size: 1.15rem; 
  font-weight: 800; 
  color: var(--black); 
  margin-bottom: 32px; 
  display: flex; 
  align-items: center; 
  justify-content: center;
  gap: 12px; 
}

.steps-container {
  padding: 0 20px;
  margin-bottom: 20px;
}

.steps { 
  display: flex; 
  justify-content: space-between; 
  position: relative; 
}

.steps::before {
  content: "";
  position: absolute;
  top: 16px;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--bg-input);
  z-index: 1;
  border-radius: 4px;
}

.step-line-active {
  position: absolute;
  top: 16px;
  left: 0;
  height: 4px;
  background: var(--blue);
  z-index: 2;
  width: 0%;
  transition: width .8s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-radius: 4px;
}

.step { 
  position: relative; 
  z-index: 3; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  gap: 10px; 
  width: 70px; 
}

.step-dot {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--bg-card-s);
  border: 3px solid var(--bg-input);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: all .4s var(--ease);
  box-shadow: var(--sh);
}

.step.active .step-dot { 
  border-color: var(--blue); 
  background: var(--blue); 
  color: #fff; 
  box-shadow: 0 0 15px rgba(59,143,212,.4);
  transform: scale(1.1);
}

.step.done .step-dot { 
  border-color: var(--blue); 
  background: var(--bg-card-s); 
  color: var(--blue); 
}

.step-lbl { 
  font-size: .62rem; 
  font-weight: 800; 
  color: var(--subtle); 
  text-transform: uppercase; 
  letter-spacing: .8px; 
  text-align: center;
  transition: color .3s;
}

.step.active .step-lbl { color: var(--blue); }
.step.done .step-lbl { color: var(--dark); }

/* ── Receipt View ─────────────────────────────── */
.rcpt-modal {
  background: var(--bg-card-s);
  border-radius: var(--rl);
  width: 100%;
  box-shadow: var(--sh-float);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1.5px solid var(--border-input);
}

.rcpt-header { 
  background: var(--black); 
  padding: 24px 30px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
}

[data-theme="dark"] .rcpt-header {
  background: #1e293b;
}

.rcpt-logo img { height: 44px; width: auto; }
.rcpt-header-right { text-align: right; color: #fff; }
.rcpt-title { font-size: .65rem; font-weight: 800; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: 2px; }
.rcpt-number { font-family: var(--mono); font-size: 1.3rem; font-weight: 800; margin-top: 4px; }

.rcpt-body { padding: 32px 30px; }
.rcpt-section-label { 
  font-size: .68rem; 
  font-weight: 900; 
  color: var(--subtle); 
  text-transform: uppercase; 
  letter-spacing: 1.8px; 
  margin: 30px 0 14px; 
  border-bottom: 1px solid var(--border-input); 
  padding-bottom: 10px; 
  display: flex;
  align-items: center;
  gap: 8px;
}
.rcpt-section-label:first-child { margin-top: 0; }

.rcpt-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
.rcpt-table th { text-align: left; font-size: .68rem; font-weight: 800; color: var(--subtle); padding: 10px 12px; background: var(--bg-table-head); border-radius: 6px; }
.rcpt-table td { padding: 14px 12px; border-bottom: 1px solid var(--border-input); font-size: .9rem; color: var(--black); }
.rcpt-table td.r { text-align: right; font-family: var(--mono); font-size: .85rem; }
.rcpt-table td.bold { font-weight: 800; text-align: right; }

.rcpt-grand { 
  background: var(--black); 
  color: #fff; 
  padding: 18px 24px; 
  border-radius: 14px; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  margin-top: 24px; 
}

[data-theme="dark"] .rcpt-grand { background: #0c1e38; }

.rcpt-grand-lbl { font-size: .85rem; font-weight: 700; opacity: .8; }
.rcpt-grand-val { font-size: 1.6rem; font-weight: 900; font-family: var(--mono); }

/* ── Actions Bar ─────────────────────────────── */
.portal-actions {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-card-s);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1.5px solid var(--border-input);
  padding: 20px 24px 32px;
  display: flex;
  gap: 16px;
  justify-content: center;
  z-index: 100;
}

.btn-portal {
  flex: 1;
  max-width: 260px;
  height: 54px;
  border-radius: 16px;
  font-size: 1rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: all .25s var(--ease);
  border: none;
}

.btn-approve { background: var(--success); color: #fff; box-shadow: 0 6px 16px rgba(34,197,94,.3); }
.btn-approve:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(34,197,94,.4); }
.btn-decline { background: var(--bg-input); border: 1.5px solid var(--border-input); color: var(--danger); }
.btn-decline:hover { background: rgba(239,68,68,.1); transform: translateY(-3px); }
.btn-print { background: var(--bg-btn-ghost); border: 1.5px solid var(--border-input); color: var(--black); }
.btn-print:hover { background: var(--bg-hover); transform: translateY(-3px); }

/* ── PIN Entry Screen ─────────────────────────────── */
.pin-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.pin-card {
  background: var(--bg-card-s);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1.5px solid var(--border-input);
  border-radius: var(--rx);
  padding: 50px 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: var(--sh-float);
}

.pin-icon { font-size: 3.5rem; margin-bottom: 24px; }
.pin-title { font-size: 1.4rem; font-weight: 900; color: var(--black); margin-bottom: 12px; }
.pin-desc { font-size: .9rem; color: var(--subtle); margin-bottom: 32px; line-height: 1.6; }

.pin-input-group {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 32px;
}

.pin-field {
  width: 56px;
  height: 72px;
  background: var(--bg-input);
  border: 2px solid rgba(148, 163, 184, 0.4); /* Stronger border to identify fields easily */
  border-radius: var(--r);
  font-size: 1.8rem;
  font-weight: 800;
  text-align: center;
  color: var(--black);
  transition: all .25s var(--ease);
  flex-shrink: 0;
  -webkit-appearance: none;
  appearance: none;
}

.pin-field:-webkit-autofill, .pin-field:-webkit-autofill:hover, .pin-field:-webkit-autofill:focus {
  -webkit-text-fill-color: var(--black) !important;
  -webkit-box-shadow: 0 0 0px 1000px var(--bg-input) inset !important;
  transition: background-color 5000s ease-in-out 0s;
}

.pin-field:focus {
  border-color: var(--blue);
  background: var(--bg-card-s);
  box-shadow: 0 0 0 5px rgba(59,143,212,.2);
  outline: none;
  transform: translateY(-2px);
}


/* ── Loading & Errors ─────────────────────────────── */
.portal-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh; gap: 20px; color: var(--subtle); }
.spinner { width: 40px; height: 40px; border: 4px solid var(--bg-input); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.portal-error { text-align: center; padding: 60px 24px; animation: fadeUp .5s var(--ease) both; }
.error-icon { font-size: 4rem; margin-bottom: 24px; }

/* ── Animations ─────────────────────────────── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
.animate { animation: fadeUp .6s var(--ease) forwards; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  75% { transform: translateX(8px); }
}
.shake { animation: shake .4s var(--ease); }

</style>
</head>
<body class="animate">

<div class="portal-container" id="portalContent">
  <!-- Loading State -->
  <div class="portal-loading" id="loadingState">
    <div class="spinner"></div>
    <p>A carregar o seu pedido...</p>
  </div>
</div>

<!-- PIN Overlay (Hidden by default) -->
<div class="pin-overlay" id="pinOverlay" style="display:none">
  <div class="pin-card" id="pinCard">
    <div class="pin-icon">🔐</div>
    <div class="pin-title">Acesso Restrito</div>
    <div class="pin-desc">Insira o código de 4 dígitos enviado pelo WhatsApp para ver os detalhes.</div>
    <div class="pin-input-group">
      <input type="password" maxlength="1" class="pin-field" id="p1" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p2" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p3" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p4" inputmode="numeric">
    </div>
    <p id="pinError" style="color:var(--danger);font-size:.8rem;font-weight:600;display:none;margin-top:-10px;margin-bottom:10px">Código incorreto. Tente novamente.</p>
  </div>
</div>

<!-- Actions Bar -->
<div class="portal-actions" id="actionsBar" style="display:none">
  <!-- Dynamic buttons based on status -->
</div>

<script>
let _order = null;
let _company = null;
const _token = new URLSearchParams(window.location.search).get('t');

async function init() {
  if (!_token) {
    renderError('Link inválido', 'Não forneceu o token de acesso necessário.', '🔍');
    return;
  }

  try {
    const data = await DB.getTrackingInfo(_token);
    _order = data.order;
    _company = data;
    
    // Check if we already have a valid PIN in session
    const storedPin = sessionStorage.getItem('3dzaap_portal_pin_' + _token);
    if (_order.passphrase && _order.passphrase !== storedPin) {
      showPinScreen();
    } else {
      renderPortal();
    }
  } catch (err) {
    renderError('Não encontrado', err.message, '📄');
  }
}

function showPinScreen() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('pinOverlay').style.display = 'flex';
  
  const inputs = document.querySelectorAll('.pin-field');
  inputs.forEach((input, idx) => {
    input.addEventListener('input', (e) => {
      if (e.target.value.length === 1 && idx < inputs.length - 1) {
        inputs[idx + 1].focus();
      }
      checkFullPin();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && idx > 0) {
        inputs[idx - 1].focus();
      }
    });
  });
  inputs[0].focus();
}

function checkFullPin() {
  const inputs = document.querySelectorAll('.pin-field');
  const pin = Array.from(inputs).map(i => i.value).join('');
  if (pin.length === 4) {
    if (pin === _order.passphrase) {
      sessionStorage.setItem('3dzaap_portal_pin_' + _token, pin);
      document.getElementById('pinOverlay').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('pinOverlay').style.display = 'none';
        renderPortal();
      }, 300);
    } else {
      const card = document.getElementById('pinCard');
      const err = document.getElementById('pinError');
      card.classList.add('shake');
      err.style.display = 'block';
      inputs.forEach(i => i.value = '');
      inputs[0].focus();
      setTimeout(() => card.classList.remove('shake'), 400);
    }
  }
}

function renderPortal() {
  const container = document.getElementById('portalContent');
  const actions = document.getElementById('actionsBar');
  
  // Decide what to show
  let html = '';
  
  const productionStates = ['aprovado', 'modelagem', 'printing', 'done'];
  
  // 1. Tracker Section (Production States)
  if (productionStates.includes(_order.status)) {
    html += renderTracker();
  }

  // 2. Receipt Card
  html += `
    <div class="rcpt-modal">
      <div class="rcpt-header">
        <div class="rcpt-logo">
          ${_company.logoUrl ? `<img src="${_company.logoUrl}">` : `<span style="color:#fff;font-weight:800;font-size:1.2rem">${_company.companyName}</span>`}
        </div>
        <div class="rcpt-header-right">
          <div class="rcpt-title">${['orcamento', 'validacao'].includes(_order.status) ? 'Orçamento Profissional' : 'Recibo / Pedido'}</div>
          <div class="rcpt-number">${_order.orderNumber}</div>
        </div>
      </div>
      
      <div class="rcpt-body">
        <div class="rcpt-section-label">👤 Dados do Cliente</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          <div>
            <div style="font-size:.65rem;color:var(--subtle);font-weight:700">NOME</div>
            <div style="font-weight:600;font-size:.9rem;color:var(--black)">${_order.clientName}</div>
          </div>
          <div>
            <div style="font-size:.65rem;color:var(--subtle);font-weight:700">DATA</div>
            <div style="font-weight:600;font-size:.9rem;color:var(--black)">${new Date(_order.createdAt).toLocaleDateString('pt-PT')}</div>
          </div>
        </div>

        <div class="rcpt-section-label">📦 Itens Impressos</div>
        <table class="rcpt-table">
          <thead>
            <tr>
              <th>Descrição</th>
              <th style="width:60px;text-align:right">Qtd</th>
              <th style="width:100px;text-align:right">Total</th>
            </tr>
          </thead>
          <tbody>
            ${_order.items.map(item => `
              <tr>
                <td>
                  <strong>${item.description}</strong><br>
                  <span style="font-size:.7rem;color:var(--muted)">${item.material || 'N/A'} — ${item.weight || 0}g</span>
                </td>
                <td class="r">${item.qty}</td>
                <td class="r bold">${parseFloat(item.total).toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}€</td>
              </tr>
            `).join('')}
          </tbody>
        </table>

        <div class="rcpt-grand">
          <div class="rcpt-grand-lbl">VALOR TOTAL ESTIMADO</div>
          <div class="rcpt-grand-val">${parseFloat(_order.total).toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}€</div>
        </div>
        
        ${_order.notes ? `
          <div class="rcpt-section-label">📌 Observações</div>
          <div style="font-size:.8rem;color:var(--muted);line-height:1.5">${_order.notes}</div>
        ` : ''}
      </div>
    </div>
  `;

  container.innerHTML = html;
  
  // 3. Render Buttons
  renderButtons();
  actions.style.display = 'flex';
}

function renderTracker() {
  const statuses = ['orcamento', 'aprovado', 'modelagem', 'printing', 'done'];
  const labels = ['Análise', 'Confirmado', 'Modelagem', 'Impressão', 'Pronto'];
  const icons = ['⏳', '📦', '📐', '🖨️', '✅'];
  
  // Current status index
  let currentIdx = statuses.indexOf(_order.status);
  if (currentIdx === -1) {
    if (_order.status === 'validacao') currentIdx = 0;
    else currentIdx = 1; // Default to confirmed
  }
  
  const stepPercent = (currentIdx / (statuses.length - 1)) * 100;

  let stepsHtml = '';
  labels.forEach((lbl, i) => {
    let cls = '';
    if (i === currentIdx) cls = 'active';
    else if (i < currentIdx) cls = 'done';
    
    stepsHtml += `
      <div class="step ${cls}">
        <div class="step-dot">${icons[i]}</div>
        <div class="step-lbl">${lbl}</div>
      </div>
    `;
  });

  return `
    <div class="tracker-card">
      <div class="tracker-title">🚀 Acompanhamento do Pedido</div>
      <div class="steps-container">
        <div class="steps">
          <div class="step-line-active" style="width: ${stepPercent}%"></div>
          ${stepsHtml}
        </div>
      </div>
      <div style="text-align:center;font-size:.85rem;color:var(--subtle);margin-top:24px;font-weight:700;letter-spacing:1px">
        STATUS ATUAL: <strong style="color:var(--blue)">${labels[currentIdx].toUpperCase()}</strong>
      </div>
    </div>
  `;
}

function renderButtons() {
  const bar = document.getElementById('actionsBar');
  let html = '';
  
  const decisionStates = ['orcamento', 'validacao'];
  
  if (decisionStates.includes(_order.status)) {
    html += `
      <button class="btn-portal btn-decline" onclick="handleAction('decline')">❌ Declinar</button>
      <button class="btn-portal btn-approve" onclick="handleAction('approve')">✅ Aprovar Orçamento</button>
    `;
  } else if (_order.status === 'declined') {
    html += `<div style="color:var(--danger);font-weight:700">Orçamento foi declinado.</div>`;
  } else {
    // Production/Tracking view
    html += `
      <button class="btn-portal btn-print" onclick="window.print()">🖨️ PDF / Recibo</button>
      <button class="btn-portal btn-approve" onclick="notifyOwner()" style="background:var(--blue)">📱 Contactar WhatsApp</button>
    `;
  }
  
  bar.innerHTML = html;
}

async function handleAction(action) {
  if (action === 'approve') {
    const confirm = window.confirm('Ao aprovar, confirma os detalhes deste orçamento e autoriza o início da produção. Vamos avançar?');
    if (!confirm) return;
  }
  
  try {
    const btn = (action === 'approve') ? document.querySelector('.btn-approve') : document.querySelector('.btn-decline');
    if (btn) { btn.disabled = true; btn.innerHTML = '⏳...'; }
    
    await DB.respondToQuote(_token, action);
    
    if (action === 'approve') {
      alert('Orçamento Aprovado com sucesso! Agora pode acompanhar a produção através deste mesmo link.');
      window.location.reload();
    } else {
      alert('Orçamento declinado.');
      window.location.reload();
    }
  } catch (err) {
    alert('Erro: ' + err.message);
  }
}

function notifyOwner() {
  const phone = _company.companyConfig?.cPhone || '';
  const cleanPhone = phone.replace(/\D/g, '');
  const msg = encodeURIComponent(`Olá! Vi o estado do meu pedido ${_order.orderNumber} no portal e gostaria de falar consigo.`);
  window.open(`https://wa.me/${cleanPhone}?text=${msg}`, '_blank');
}

function renderError(title, msg, icon) {
  document.getElementById('portalContent').innerHTML = `
    <div class="portal-error">
      <div class="error-icon">${icon}</div>
      <h1>${title}</h1>
      <p style="color:var(--muted);max-width:300px;margin:10px auto">${msg}</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:24px;display:inline-flex">Voltar ao site</a>
    </div>
  `;
}

init();
</script>
</body>
</html>
