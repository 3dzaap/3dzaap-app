<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DZAAP — Portal do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="utils.js"></script>
<script src="i18n.js"></script>
<!-- Theme Init -->
<script>
  (function(){
    var t = localStorage.getItem('3dzaap_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>
/* ── Portal Specific Styles ─────────────────────────────── */
body { 
  background: var(--bg-page); 
  color: var(--black); 
  min-height: 100dvh; 
  display: flex; 
  flex-direction: column;
}

.portal-container {
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 16px 120px;
  flex: 1;
}

/* ── Progress Tracker ─────────────────────────────── */
.tracker-card {
  background: var(--bg-card-s);
  border: 1.5px solid var(--border-input);
  border-radius: var(--rl);
  padding: 32px 24px;
  margin-bottom: 28px;
  box-shadow: var(--sh-float);
  text-align: center;
}

.tracker-title { 
  font-size: 1.15rem; 
  font-weight: 800; 
  color: var(--black); 
  margin-bottom: 32px; 
  display: flex; 
  align-items: center; 
  justify-content: center;
  gap: 12px; 
}

.steps-container {
  padding: 0 10px;
  margin-bottom: 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.steps { 
  display: flex; 
  justify-content: space-between; 
  position: relative; 
  min-width: 480px; /* Force minimum width for tracker to avoid overlap */
  padding: 10px 0;
}

.steps::before {
  content: "";
  position: absolute;
  top: 16px;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--bg-input);
  z-index: 1;
  border-radius: 4px;
}

.step-line-active {
  position: absolute;
  top: 16px;
  left: 0;
  height: 4px;
  background: var(--blue);
  z-index: 2;
  width: 0%;
  transition: width .8s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-radius: 4px;
}

.step { 
  position: relative; 
  z-index: 3; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  gap: 10px; 
  width: 70px; 
}

.step-dot {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--bg-card-s);
  border: 3px solid var(--bg-input);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: all .4s var(--ease);
  box-shadow: var(--sh);
}

.step.active .step-dot { 
  border-color: var(--blue); 
  background: var(--blue); 
  color: #fff; 
  box-shadow: 0 0 15px rgba(59,143,212,.4);
  transform: scale(1.1);
}

.step.done .step-dot { 
  border-color: var(--blue); 
  background: var(--bg-card-s); 
  color: var(--blue); 
}

.step-lbl { 
  font-size: .62rem; 
  font-weight: 800; 
  color: var(--subtle); 
  text-transform: uppercase; 
  letter-spacing: .8px; 
  text-align: center;
  transition: color .3s;
}

.step.active .step-lbl { color: var(--blue); }
.step.done .step-lbl { color: var(--dark); }

/* ── ESTADOS (Badges Rápidos) ── */
.rcpt-status-bar { padding: 8px 16px; font-size: .7rem; font-weight: 700; display: flex; align-items: center; justify-content: space-between; gap: 8px; border-bottom: 1px solid var(--border); }
.rcpt-status-bar.paid { background: rgba(34,197,94,.08); color: #16a34a; }
.rcpt-status-bar.pending { background: rgba(245,158,11,.08); color: #d97706; }
.rcpt-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block; margin-right: 6px; }

/* ── RECIBO FOOTER ── */
.rcpt-sig-row { display: flex; justify-content: space-between; align-items: flex-end; padding: 24px 20px 0; }
.rcpt-sig-block { text-align: center; min-width: 160px; }
.rcpt-sig-img { max-height: 50px; margin-bottom: 4px; display: block; margin-left: auto; margin-right: auto; }
.rcpt-sig-line { height: 1px; background: #cbd5e1; margin-bottom: 4px; }
.rcpt-sig-name { font-size: .65rem; font-weight: 700; color: #475569; text-transform: uppercase; }
.rcpt-sig-location { font-size: .6rem; color: #94a3b8; margin-top: 2px; }

.rcpt-footer { margin-top: 32px; padding: 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: .7rem; display: flex; justify-content: space-between; align-items: center; }
.rcpt-brand { font-weight: 900; font-family: 'Outfit', sans-serif; letter-spacing: -0.5px; font-size: 1.1rem; display: flex; align-items: center; gap: 4px; }
.rcpt-brand .b3d { color: var(--blue); }
.rcpt-brand .bzp { color: var(--orange); }
.rcpt-tagline { font-size: .6rem; opacity: .6; text-transform: uppercase; letter-spacing: 1px; }

/* ── Receipt View ─────────────────────────────── */
.rcpt-modal {
  background: var(--bg-card-s);
  border-radius: var(--rl);
  width: 100%;
  box-shadow: var(--sh-float);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1.5px solid var(--border-input);
}

.rcpt-header { 
  background: var(--black); 
  padding: 24px 30px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
}

[data-theme="dark"] .rcpt-header {
  background: #1e293b;
}

.rcpt-logo img { height: 44px; width: auto; }
.rcpt-header-right { text-align: right; color: #fff; }
.rcpt-title { font-size: .65rem; font-weight: 800; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: 2px; }
.rcpt-number { font-family: var(--mono); font-size: 1.3rem; font-weight: 800; margin-top: 4px; }

.rcpt-body { padding: 32px 30px; }
.rcpt-section-label { 
  font-size: .68rem; 
  font-weight: 900; 
  color: var(--subtle); 
  text-transform: uppercase; 
  letter-spacing: 1.8px; 
  margin: 30px 0 14px; 
  border-bottom: 1px solid var(--border-input); 
  padding-bottom: 10px; 
  display: flex;
  align-items: center;
  gap: 8px;
}
.rcpt-section-label:first-child { margin-top: 0; }

.rcpt-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 16px 0; }
.rcpt-table { width: 100%; border-collapse: collapse; min-width: 500px; }
.rcpt-table th { text-align: left; font-size: .68rem; font-weight: 800; color: var(--subtle); padding: 10px 12px; background: var(--bg-table-head); border-radius: 6px; }
.rcpt-table td { padding: 14px 12px; border-bottom: 1px solid var(--border-input); font-size: .9rem; color: var(--black); }
.rcpt-table td.r { text-align: right; font-family: var(--mono); font-size: .85rem; }
.rcpt-table td.bold { font-weight: 800; text-align: right; }

.rcpt-grand { 
  background: var(--black); 
  color: #fff; 
  padding: 18px 24px; 
  border-radius: 14px; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  margin-top: 24px; 
}

[data-theme="dark"] .rcpt-grand { background: #0c1e38; }

.rcpt-grand-lbl { font-size: .85rem; font-weight: 700; opacity: .8; }
.rcpt-grand-val { font-size: 1.6rem; font-weight: 900; font-family: var(--mono); }

/* ── Actions Bar ─────────────────────────────── */
.portal-actions {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-card-s);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1.5px solid var(--border-input);
  padding: 20px 24px 32px;
  display: flex;
  gap: 16px;
  justify-content: center;
  z-index: 100;
}

.btn-portal {
  flex: 1;
  max-width: 260px;
  height: 54px;
  border-radius: 16px;
  font-size: 1rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: all .25s var(--ease);
  border: none;
}

.btn-approve { background: var(--success); color: #fff; box-shadow: 0 6px 16px rgba(34,197,94,.3); }
.btn-approve:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(34,197,94,.4); }
.btn-decline { background: var(--bg-input); border: 1.5px solid var(--border-input); color: var(--danger); }
.btn-decline:hover { background: rgba(239,68,68,.1); transform: translateY(-3px); }
.btn-print { background: var(--bg-btn-ghost); border: 1.5px solid var(--border-input); color: var(--black); }
.btn-print:hover { background: var(--bg-hover); transform: translateY(-3px); }

/* ── PIN Entry Screen ─────────────────────────────── */
.pin-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.pin-card {
  background: var(--bg-card-s);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1.5px solid var(--border-input);
  border-radius: var(--rx);
  padding: 50px 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: var(--sh-float);
}

.pin-icon { font-size: 3.5rem; margin-bottom: 24px; }
.pin-title { font-size: 1.4rem; font-weight: 900; color: var(--black); margin-bottom: 12px; }
.pin-desc { font-size: .9rem; color: var(--subtle); margin-bottom: 32px; line-height: 1.6; }

.pin-input-group {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 32px;
}

.pin-field {
  width: 56px;
  height: 72px;
  background: var(--bg-input);
  border: 2px solid rgba(148, 163, 184, 0.4); /* Stronger border to identify fields easily */
  border-radius: var(--r);
  font-size: 1.8rem;
  font-weight: 800;
  text-align: center;
  color: var(--black);
  transition: all .25s var(--ease);
  flex-shrink: 0;
  -webkit-appearance: none;
  appearance: none;
}

.pin-field:-webkit-autofill, .pin-field:-webkit-autofill:hover, .pin-field:-webkit-autofill:focus {
  -webkit-text-fill-color: var(--black) !important;
  -webkit-box-shadow: 0 0 0px 1000px var(--bg-input) inset !important;
  transition: background-color 5000s ease-in-out 0s;
}

.pin-field:focus {
  border-color: var(--blue);
  background: var(--bg-card-s);
  box-shadow: 0 0 0 5px rgba(59,143,212,.2);
  outline: none;
  transform: translateY(-2px);
}


/* ── Loading & Errors ─────────────────────────────── */
.portal-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh; gap: 20px; color: var(--subtle); }
.spinner { width: 40px; height: 40px; border: 4px solid var(--bg-input); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.portal-error { text-align: center; padding: 60px 24px; animation: fadeUp .5s var(--ease) both; }
.error-icon { font-size: 4rem; margin-bottom: 24px; }

/* ── Animations ─────────────────────────────── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
.animate { animation: fadeUp .6s var(--ease) forwards; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  75% { transform: translateX(8px); }
}
.shake { animation: shake .4s var(--ease); }

</style>
</head>
<body class="animate">

<div class="portal-container" id="portalContent">
  <!-- Loading State -->
  <div class="portal-loading" id="loadingState">
    <div class="spinner"></div>
    <p data-i18n="portal.loading">A carregar o seu pedido...</p>
  </div>
</div>

<!-- PIN Overlay (Hidden by default) -->
<div class="pin-overlay" id="pinOverlay" style="display:none">
  <div class="pin-card" id="pinCard">
    <div class="pin-icon"><i class="ph-bold ph-lock-key"></i></div>
    <div class="pin-title" data-i18n="portal.pin_title">Acesso Restrito</div>
    <div class="pin-desc" data-i18n="portal.pin_desc">Insira o código de 4 dígitos enviado pelo WhatsApp para ver os detalhes.</div>
    <div class="pin-input-group">
      <input type="password" maxlength="1" class="pin-field" id="p1" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p2" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p3" inputmode="numeric">
      <input type="password" maxlength="1" class="pin-field" id="p4" inputmode="numeric">
    </div>
    <p id="pinError" style="color:var(--danger);font-size:.8rem;font-weight:600;display:none;margin-top:-10px;margin-bottom:10px" data-i18n="portal.pin_err">Código incorreto. Tente novamente.</p>
  </div>
</div>

<!-- Actions Bar -->
<div class="portal-actions" id="actionsBar" style="display:none">
  <!-- Dynamic buttons based on status -->
</div>

<script>
const t = (k, v) => window.i18n ? window.i18n.getNestedTranslation(k, v) : k;

let _order = null;
let _company = null;
const _token = new URLSearchParams(window.location.search).get('t');

async function init() {
  // Wait for i18n to be ready before rendering
  if (window.i18n) await window.i18n.init();

  if (!_token) {
    renderError(t('portal.err_secure_title'), t('portal.err_token_desc'), '<i class="ph-bold ph-magnifying-glass"></i>');
    return;
  }

  try {
    const data = await DB.getTrackingInfo(_token);
    _order = data.order;
    _company = data;
    
    // Check stored PIN
    const storedPin = sessionStorage.getItem('3dzaap_portal_pin_' + _token);
    
    // Enforcement: Always show PIN screen if a passphrase exists
    if (_order.passphrase && _order.passphrase !== storedPin) {
      showPinScreen();
    } else if (!_order.passphrase) {
      // Security fall-through for very old orders without PIN
      renderError(t('portal.err_secure_title'), t('portal.err_secure_desc'), '<i class="ph-bold ph-lock"></i>');
    } else {
      renderPortal();
    }
  } catch (err) {
    if (err.message === 'portal.err_expired_desc') {
      renderError(t('portal.err_expired_title'), t(err.message), '<i class="ph-bold ph-hourglass"></i>');
    } else {
      renderError('Não encontrado', err.message, '<i class="ph-bold ph-file-text"></i>');
    }
  }
}

function showPinScreen() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('pinOverlay').style.display = 'flex';
  
  const inputs = document.querySelectorAll('.pin-field');
  inputs.forEach((input, idx) => {
    input.addEventListener('input', (e) => {
      if (e.target.value.length === 1 && idx < inputs.length - 1) {
        inputs[idx + 1].focus();
      }
      checkFullPin();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && idx > 0) {
        inputs[idx - 1].focus();
      }
    });
  });
  inputs[0].focus();
}

function checkFullPin() {
  const inputs = document.querySelectorAll('.pin-field');
  const pin = Array.from(inputs).map(i => i.value).join('');
  if (pin.length === 4) {
    if (pin === _order.passphrase) {
      sessionStorage.setItem('3dzaap_portal_pin_' + _token, pin);
      document.getElementById('pinOverlay').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('pinOverlay').style.display = 'none';
        renderPortal();
      }, 300);
    } else {
      const card = document.getElementById('pinCard');
      const err = document.getElementById('pinError');
      card.classList.add('shake');
      err.style.display = 'block';
      inputs.forEach(i => i.value = '');
      inputs[0].focus();
      setTimeout(() => card.classList.remove('shake'), 400);
    }
  }
}

function renderPortal() {
  const container = document.getElementById('portalContent');
  const actions = document.getElementById('actionsBar');
  
  // Decide what to show
  let html = '';
  
  // 1. Tracker Section (Production States)
  // Show tracker if it's not declined
  if (_order.status !== 'declined') {
    html += renderTracker();
  }

  // 2. Receipt Card
  const isPaid = _order.paymentStatus === 'pago';
  const statusLabels = {
    orcamento: 'Orçamento', modelagem: 'Modelagem', validacao: 'Aprovação', 
    aprovado: 'Confirmado', fila: 'Em Fila', printing: 'Produção', 
    preparacao: 'Preparação', enviado: 'Enviado', done: 'Concluído'
  };

  html += `
    <div class="rcpt-modal" id="printableReceipt">
      <div class="rcpt-header">
        <div class="rcpt-logo">
          ${_company.logoUrl 
            ? `<img src="${_company.logoUrl}" style="height:38px;width:auto;object-fit:contain;border-radius:22%">` 
            : `<div class="brand-logo-wrap" style="margin-bottom:0; gap:8px">
                 <img src="logo.jpg" class="brand-nozzle squacircle" style="width:32px; height:32px; padding:3px">
                 <div class="brand-text" style="font-size:1.1rem; color:#fff">
                   <span class="b3d">3D</span><span class="bzp">ZAAP</span>
                 </div>
               </div>`}
          <div style="font-size:.6rem;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.05em;text-transform:uppercase">${_company.companyName}</div>
        </div>
        <div class="rcpt-header-right">
          <div class="rcpt-title">${isPaid ? t('portal.rcpt_title_paid') : t('portal.rcpt_title_os')}</div>
          <div class="rcpt-number">${_order.orderNumber}</div>
          <div class="rcpt-date">${t('portal.issued_at')} ${new Date().toLocaleDateString(window.i18n?.currentLocale || 'pt-PT')}</div>
          ${_order.expiresAt ? `<div class="rcpt-date" style="color:var(--orange);font-weight:700;font-size:0.58rem;opacity:0.9">${t('portal.link_valid_until')}: ${new Date(_order.expiresAt).toLocaleDateString(window.i18n?.currentLocale || 'pt-PT')}</div>` : ''}
        </div>
      </div>

      <div class="rcpt-status-bar ${isPaid ? 'paid' : 'pending'}">
         <span><span class="rcpt-dot"></span>${isPaid ? '<i class="ph-bold ph-check-circle"></i> ' + t('portal.status_paid') : '<i class="ph-bold ph-hourglass"></i> ' + t('portal.status_awaiting')}</span>
         <span style="display:flex;align-items:center;gap:5px;opacity:0.75;font-size:.62rem">${t('portal.order_status')}: <span style="opacity:1;font-size:.68rem">${t('status.' + _order.status) || _order.status}</span></span>
      </div>
      
      <div class="rcpt-body">
        <div class="rcpt-section-label">${t('portal.client_data')}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          <div>
            <div style="font-size:.65rem;color:var(--subtle);font-weight:700">${t('portal.lbl_name')}</div>
            <div style="font-weight:600;font-size:.9rem;color:var(--black)">${_order.clientName}</div>
          </div>
          <div>
            <div style="font-size:.65rem;color:var(--subtle);font-weight:700">${t('portal.lbl_created_at')}</div>
            <div style="font-weight:600;font-size:.9rem;color:var(--black)">${new Date(_order.createdAt).toLocaleDateString(window.i18n?.currentLocale || 'pt-PT')}</div>
          </div>
        </div>

        <div class="rcpt-section-label">${t('portal.order_items')}</div>
        <table class="rcpt-table">
          <thead>
            <tr>
              <th>${t('portal.th_desc')}</th>
              <th style="width:60px;text-align:right">${t('portal.th_qty')}</th>
              <th style="width:100px;text-align:right;padding-right:0">${t('portal.th_total')}</th>
            </tr>
          </thead>
          <tbody>
            ${_order.items.map(item => {
              const qty = item.quantity || item.qty || 1;
              const unit = item.unitPrice || 0;
              const rowTotal = qty * unit;
              return `
                <tr>
                  <td>
                    <strong>${item.description}</strong><br>
                    <span style="font-size:.7rem;color:var(--muted)">${item.material || ''} ${item.weightG || item.weight ? (item.weightG || item.weight)+'g' : ''}</span>
                  </td>
                  <td class="r">${qty}</td>
                  <td class="r bold">${fmtCurrency(rowTotal)}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>

        <div class="rcpt-grand" style="background:var(--bg-grand-total);border-radius:8px;padding:9px 14px">
          <span style="font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase">${t('portal.total')}</span>
          <span style="font-size:1.1rem;font-weight:800;color:var(--blue)">${fmtCurrency(_order.total || 0)}</span>
        </div>
        
        ${_order.notes ? `
          <div class="rcpt-section-label"><i class="ph-bold ph-push-pin"></i> ${t('portal.notes')}</div>
          <div style="font-size:.8rem;color:var(--muted);line-height:1.5">${_order.notes}</div>
        ` : ''}

        <div class="rcpt-sig-row">
          <div></div>
          <div class="rcpt-sig-block">
            ${_company.signature ? `<img class="rcpt-sig-img" src="${_company.signature}" alt="Assinatura">` : ''}
            <div class="rcpt-sig-line"></div>
            <div class="rcpt-sig-name">${_company.companyName}</div>
            <div class="rcpt-sig-location">${_company.companyConfig.city || 'Lisboa'}, ${new Date().toLocaleDateString('pt-PT')}</div>
          </div>
        </div>
      </div>
      
      <div class="rcpt-footer">
        <div>
          <div class="rcpt-brand"><span class="b3d">3D</span><span class="bzp">ZAAP</span></div>
          <div class="rcpt-tagline">Print Manager</div>
        </div>
        <div style="font-size:.75rem;font-weight:600;color:var(--blue);opacity:0.8">Obrigado pela sua confiança! <i class="ph-bold ph-hands-praying"></i></div>
      </div>
    </div>
  `;

  container.innerHTML = html;
  
  // 3. Render Buttons
  renderButtons();
  actions.style.display = 'flex';
}

function renderTracker() {
  const steps = [
    { k: 'orcamento',  l: t('portal.tracker_step_1'), i: '<i class="ph-bold ph-hourglass"></i>' },
    { k: 'modelagem',  l: t('portal.tracker_step_2'), i: '<i class="ph-bold ph-ruler"></i>' },
    { k: 'validacao',  l: t('portal.tracker_step_3'), i: '<i class="ph-bold ph-check-circle"></i>' },
    { k: 'fila',       l: t('portal.tracker_step_4'),      i: '<i class="ph-bold ph-package"></i>' },
    { k: 'printing',   l: t('portal.tracker_step_5'),  i: '<i class="ph-bold ph-printer"></i>' },
    { k: 'preparacao', l: t('portal.tracker_step_6'),i: '<i class="ph-bold ph-rocket-launch"></i>' },
    { k: 'done',       l: t('portal.tracker_step_7'),      i: '<i class="ph-bold ph-flag-checkered"></i>' }
  ];
  
  // Revised mapping for intuitive 7-step flow
  const s = _order.status;
  let stepIdx = 0;
  if (s === 'modelagem') stepIdx = 1;
  else if (s === 'validacao') stepIdx = 2;
  else if (s === 'aprovado' || s === 'fila') stepIdx = 3;
  else if (s === 'printing') stepIdx = 4;
  else if (s === 'preparacao' || s === 'enviado') stepIdx = 5;
  else if (s === 'done') stepIdx = 6;
  
  const stepPercent = (stepIdx / (steps.length - 1)) * 100;

  let stepsHtml = '';
  steps.forEach((s, i) => {
    let cls = '';
    if (i === stepIdx) cls = 'active';
    else if (i < stepIdx) cls = 'done';
    
    stepsHtml += `
      <div class="step ${cls}">
        <div class="step-dot">${s.i}</div>
        <div class="step-lbl">${s.l}</div>
      </div>
    `;
  });

  return `
    <div class="tracker-card">
      <div class="tracker-title"><i class="ph-bold ph-rocket-launch"></i> ${t('portal.tracker_title')}</div>
      <div class="steps-container">
        <div class="steps">
          <div class="step-line-active" style="width: ${stepPercent}%"></div>
          ${stepsHtml}
        </div>
      </div>
      <div style="text-align:center;font-size:.85rem;color:var(--subtle);margin-top:24px;font-weight:700;letter-spacing:1px">
        ${t('portal.curr_status')}: <strong style="color:var(--blue)">${(steps[stepIdx].l||'').toUpperCase()}</strong>
      </div>
    </div>
  `;
}

function renderButtons() {
  const bar = document.getElementById('actionsBar');
  let html = '';
  
  const status = _order.status;
  const isApproved = !['orcamento', 'modelagem', 'validacao', 'declined'].includes(status);
  
  if (status === 'orcamento') {
    html += `
      <button class="btn-portal btn-decline" onclick="handleAction('decline')"><i class="ph-bold ph-x-circle"></i> ${t('portal.btn_decline')}</button>
      <button class="btn-portal btn-approve" onclick="handleAction('approve')"><i class="ph-bold ph-check-circle"></i> ${t('portal.btn_approve_budget')}</button>
    `;
  } else if (status === 'validacao') {
    html += `
      <button class="btn-portal btn-decline" onclick="handleAction('decline')"><i class="ph-bold ph-x-circle"></i> ${t('portal.btn_reject_model')}</button>
      <button class="btn-portal btn-approve" onclick="handleAction('approve')"><i class="ph-bold ph-check-circle"></i> ${t('portal.btn_approve_final')}</button>
    `;
  } else if (status === 'declined') {
    html += `<div style="color:var(--danger);font-weight:700">${t('portal.status_declined_msg')}</div>`;
  } else {
    // Show Print button if approved or further along
    html += `
      <button class="btn-portal btn-print" onclick="printPortalReceipt()"><i class="ph-bold ph-printer"></i> ${t('portal.btn_print')}</button>
      <button class="btn-portal btn-approve" onclick="notifyOwner()" style="background:var(--blue)"><i class="ph-bold ph-whatsapp-logo"></i> ${t('portal.btn_whatsapp')}</button>
    `;
  }
  
  bar.innerHTML = html;
}

async function handleAction(action) {
  if (action === 'approve') {
    const confirm = window.confirm(t('portal.confirm_approve'));
    if (!confirm) return;
  }
  
  try {
    const btn = (action === 'approve') ? document.querySelector('.btn-approve') : document.querySelector('.btn-decline');
    if (btn) { btn.disabled = true; btn.innerHTML = '...'; }
    
    await DB.respondToQuote(_token, action);
    
    if (action === 'approve') {
      alert(t('portal.alert_approved'));
      window.location.reload();
    } else {
      alert(t('portal.alert_declined'));
      window.location.reload();
    }
  } catch (err) {
    alert(t('portal.alert_err') + ': ' + err.message);
  }
}

function notifyOwner() {
  const phone = _company.companyConfig?.cPhone || '';
  const cleanPhone = phone.replace(/\D/g, '');
  const msg = encodeURIComponent(`Olá! Vi o estado do meu pedido ${_order.orderNumber} no portal e gostaria de falar consigo.`);
  window.open(`https://wa.me/${cleanPhone}?text=${msg}`, '_blank');
}

function printPortalReceipt() {
  const content = document.getElementById('printableReceipt').innerHTML;
  const pageStyles = Array.from(document.styleSheets)
    .filter(ss => { try { return !!ss.cssRules; } catch(e) { return false; } })
    .map(ss => Array.from(ss.cssRules).map(r => r.cssText).join('\n'))
    .join('\n');

  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Recibo / OS</title>
<style>
${pageStyles}
@media print {
  body { margin: 0; background: #fff !important; }
  .portal-actions, #actionsBar { display: none !important; }
}
body { margin: 0; background: #fff; padding: 0; }
.rcpt-modal { box-shadow: none; border: none; width: 100%; max-width: 100%; margin: 0; padding: 0; }
</style></head><body><div class="rcpt-modal">${content}</div><script>window.onload=function(){window.print();window.close();}<\/script></body></html>`);
  w.document.close();
}

function renderError(title, msg, icon) {
  document.getElementById('portalContent').innerHTML = `
    <div class="portal-error">
      <div class="error-icon">${icon}</div>
      <h1>${title}</h1>
      <p style="color:var(--muted);max-width:300px;margin:10px auto">${msg}</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:24px;display:inline-flex">${t('portal.btn_back_home')}</a>
    </div>
  `;
}

init();
</script>
<script src="i18n.js"></script>
</body>
</html>
